global:
  imagePullSecrets: []
  storageClassName: ""
  domain: memochat.example.com
  clusterDomain: cluster.local
  createNamespaces: true

namespaces:
  prod: memochat-prod
  ops: memochat-ops
  observability: memochat-observability

observability:
  enabled: true
  namespace: memochat-observability
  prometheusReleaseName: kube-prometheus-stack
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  podMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  gpu:
    nvidiaEnabled: false

images:
  gate:
    repository: memochat/gateserver
    tag: latest
    pullPolicy: IfNotPresent
  focusedGateways:
    aigateway:
      repository: memochat/aigateway
      tag: latest
      pullPolicy: IfNotPresent
    mediagateway:
      repository: memochat/mediagateway
      tag: latest
      pullPolicy: IfNotPresent
    momentsgateway:
      repository: memochat/momentsgateway
      tag: latest
      pullPolicy: IfNotPresent
    callgateway:
      repository: memochat/callgateway
      tag: latest
      pullPolicy: IfNotPresent
    r18gateway:
      repository: memochat/r18gateway
      tag: latest
      pullPolicy: IfNotPresent
    register:
      repository: memochat/register
      tag: latest
      pullPolicy: IfNotPresent
    login:
      repository: memochat/login
      tag: latest
      pullPolicy: IfNotPresent
    account:
      repository: memochat/account
      tag: latest
      pullPolicy: IfNotPresent
  chat:
    repository: memochat/chatserver
    tag: latest
    pullPolicy: IfNotPresent
  aiServer:
    repository: memochat/aiserver
    tag: latest
    pullPolicy: IfNotPresent
  aiOrchestrator:
    repository: memochat/ai-orchestrator
    tag: latest
    pullPolicy: IfNotPresent
  varify:
    repository: memochat/varifyserver
    tag: latest
    pullPolicy: IfNotPresent
  memoOps:
    repository: memochat/memo-ops
    tag: latest
    pullPolicy: IfNotPresent
  envoy:
    repository: envoyproxy/envoy
    tag: v1.38.0
    pullPolicy: IfNotPresent
  otelCollector:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.99.0
    pullPolicy: IfNotPresent

externalServices:
  postgres:
    host: postgres.example.internal
    port: 5432
    user: memochat
    password: change-me
    database: memo_pg
    schema: memo
    sslMode: disable
    roles:
      media: memo_media_app
      moments: memo_moments_app
      call: memo_call_app
      account: memo_account_app
  redis:
    host: redis.example.internal
    port: 6379
    password: change-me
  mongodb:
    uri: mongodb://memochat_app:change-me@mongo.example.internal:27017/memochat
    database: memochat
  kafka:
    brokers: kafka.example.internal:9092
  rabbitmq:
    host: rabbitmq.example.internal
    port: 5672
    username: guest
    password: guest
    vhost: /
  mysql:
    host: mysql.example.internal
    port: 3306
    password: change-me
    schema: memo
  smtp:
    host: smtp.example.internal
    port: 465
    secure: true
    user: noreply@example.com
    pass: change-me
    from: noreply@example.com
  livekit:
    url: wss://livekit.example.com
    apiKey: devkey
    apiSecret: secret

gate:
  replicaCount: 2
  service:
    port: 8080
  ingress:
    enabled: false
    className: envoy
    annotations: {}
    tls: []
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  resources: {}
  env: {}
  media:
    provider: local
    rootPath: /data/uploads
    publicBaseUrl: ""
    maxImageMB: 200
    maxFileMB: 20480
    chunkSizeKB: 4096
    sessionExpireSec: 86400

legacyGate:
  enabled: false

focusedGateways:
  enabled: true
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  resources: {}
  env: {}
  services:
    aigateway:
      serviceName: aigateway
      target: AIGatewayServer
      configKey: aigateway.ini
      configSection: AIGateway
      port: 8093
      replicaCount: 2
    mediagateway:
      serviceName: mediagateway
      target: MediaGatewayServer
      configKey: mediagateway.ini
      configSection: MediaGateway
      port: 8094
      replicaCount: 2
    momentsgateway:
      serviceName: momentsgateway
      target: MomentsGatewayServer
      configKey: momentsgateway.ini
      configSection: MomentsGateway
      port: 8099
      replicaCount: 2
    callgateway:
      serviceName: callgateway
      target: CallGatewayServer
      configKey: callgateway.ini
      configSection: CallGateway
      port: 8097
      replicaCount: 2
    r18gateway:
      serviceName: r18gateway
      target: R18GatewayServer
      configKey: r18gateway.ini
      configSection: R18Gateway
      port: 8098
      replicaCount: 2
    register:
      serviceName: register
      target: RegisterServer
      configKey: register.ini
      configSection: Register
      port: 8101
      replicaCount: 2
    login:
      serviceName: login
      target: LoginServer
      configKey: login.ini
      configSection: Login
      port: 8102
      replicaCount: 2
    account:
      serviceName: account
      target: AccountServer
      configKey: account.ini
      configSection: Account
      port: 8103
      replicaCount: 2

chat:
  replicaCount: 4
  serviceName: chatserver
  tcpPort: 8090
  rpcPort: 50055
  exposeTcpLoadBalancer: false
  tcpLoadBalancerAnnotations: {}
  pdb:
    enabled: true
    minAvailable: 2
  resources: {}
  env: {}

aiServer:
  enabled: true
  replicaCount: 2
  serviceName: aiserver
  service:
    grpcPort: 8095
  resources: {}
  env: {}

aiOrchestrator:
  enabled: true
  replicaCount: 2
  serviceName: ai-orchestrator
  service:
    port: 8096
  resources: {}
  env: {}
  dependencies:
    ollamaHost: ollama.example.internal
    ollamaPort: 11434
    ollamaEnabled: false
    qdrantHost: qdrant.example.internal
    qdrantPort: 6333
    qdrantGrpcPort: 6334
    neo4jHost: neo4j.example.internal
    neo4jPort: 7687
    neo4jEnabled: false

varify:
  replicaCount: 2
  service:
    grpcPort: 50051
    healthPort: 8081
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  resources: {}
  env: {}

memoOps:
  server:
    replicaCount: 1
    service:
      port: 9000
    resources: {}
  collector:
    replicaCount: 1
    metricsPort: 9108
    resources: {}

otelCollector:
  replicaCount: 1
  service:
    grpcPort: 4317
    httpPort: 4318
    zipkinPort: 9411
    metricsPort: 8888
  resources: {}

jobs:
  postgresMigrate:
    enabled: true
    image: postgres:16-alpine
  kafkaInit:
    enabled: true
    image: python:3.12-alpine
  rabbitmqInit:
    enabled: true
    image: python:3.12-alpine

secrets:
  chatAuthSecret: memochat-dev-chat-secret
  livekitApiKey: devkey
  livekitApiSecret: secret
