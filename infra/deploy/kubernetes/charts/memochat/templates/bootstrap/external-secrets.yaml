{{- if .Values.externalSecrets.enabled }}
{{- $storeName := required "externalSecrets.secretStoreRef.name is required" .Values.externalSecrets.secretStoreRef.name }}
{{- $storeKind := default "ClusterSecretStore" .Values.externalSecrets.secretStoreRef.kind }}
{{- $appKey := required "externalSecrets.remoteRefs.app.key is required" .Values.externalSecrets.remoteRefs.app.key }}
{{- $opsKey := required "externalSecrets.remoteRefs.ops.key is required" .Values.externalSecrets.remoteRefs.ops.key }}
{{- $etcdKey := required "externalSecrets.remoteRefs.etcd.key is required" .Values.externalSecrets.remoteRefs.etcd.key }}
{{- $etcdTlsKey := required "externalSecrets.remoteRefs.etcdTls.key is required" .Values.externalSecrets.remoteRefs.etcdTls.key }}
{{- if .Values.externalSecrets.store.create }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $storeName }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ required "externalSecrets.store.vault.server is required when store.create=true" .Values.externalSecrets.store.vault.server | quote }}
      path: {{ .Values.externalSecrets.store.vault.path | quote }}
      version: {{ .Values.externalSecrets.store.vault.version | quote }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.store.vault.auth.kubernetes.mountPath | quote }}
          role: {{ .Values.externalSecrets.store.vault.auth.kubernetes.role | quote }}
          serviceAccountRef:
            name: {{ .Values.externalSecrets.store.vault.auth.kubernetes.serviceAccountRef.name | quote }}
            namespace: {{ .Values.externalSecrets.store.vault.auth.kubernetes.serviceAccountRef.namespace | quote }}
---
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-secrets
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: memochat-secrets
    creationPolicy: Owner
  data:
    {{- range $key := list "postgres-password" "redis-password" "mongodb-uri" "rabbitmq-username" "rabbitmq-password" "neo4j-password" "mysql-password" "smtp-pass" "chat-auth-secret" "auth-refresh-pepper" "livekit-api-key" "livekit-api-secret" "minio-access-key" "minio-secret-key" "ai-internal-api-key" "ai-provider-admin-key" "r18-picacg-api-key" "r18-picacg-hmac-key" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $appKey | quote }}
        property: {{ $key | quote }}
    {{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-ops-secrets
  namespace: {{ .Values.namespaces.ops }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: memochat-ops-secrets
    creationPolicy: Owner
  data:
    {{- range $key := list "postgres-password" "redis-password" "mysql-user" "mysql-password" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $opsKey | quote }}
        property: {{ $key | quote }}
    {{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-etcd-secrets
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: memochat-etcd-secrets
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: {{ $etcdKey | quote }}
        property: root-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-etcd-tls
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: memochat-etcd-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    {{- range $key := list "ca.crt" "tls.crt" "tls.key" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $etcdTlsKey | quote }}
        property: {{ $key | quote }}
    {{- end }}
{{- end }}
