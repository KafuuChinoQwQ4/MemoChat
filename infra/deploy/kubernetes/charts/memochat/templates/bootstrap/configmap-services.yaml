    SampleRatio=1.0
    ExportLogs=true
    ExportTraces=true
    ExportMetrics=false
    ServiceName=AccountServer
    ServiceNamespace=memochat
  chat.ini: |
    [GateServer]
    Port=8080
    [VarifyServer]
    Host=varifyserver
    Port=50051
    [SelfServer]
    Name=
    [Runtime]
    Role=hybrid
    AsyncEventBus=kafka
    TaskBus=rabbitmq
    [FeatureFlags]
    chat_private_kafka_shadow=false
    chat_private_kafka_primary=false
    chat_group_kafka_shadow=false
    chat_group_kafka_primary=false
