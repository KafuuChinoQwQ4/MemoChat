    OtlpEndpoint=http://otel-collector.{{ .Values.namespaces.observability }}.svc.{{ .Values.global.clusterDomain }}:4318/v1/traces
    Protocol=otlp-http
    SampleRatio=1.0
    ExportLogs=true
    ExportTraces=true
    ExportMetrics=false
