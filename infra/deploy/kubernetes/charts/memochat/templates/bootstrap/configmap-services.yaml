    Port={{ .Values.externalServices.redis.port }}
    Passwd=
    [ChatAuth]
    HmacSecret=
    TicketTtlSec=20
    [Kafka]
    Brokers={{ .Values.externalServices.kafka.brokers }}
    ClientId=memochat-chatserver
    ConsumerGroup=memochat-chat-workers
    TopicPrivate=chat.private.v1
    TopicGroup=chat.group.v1
    TopicPrivateDlq=chat.private.dlq.v1
    TopicGroupDlq=chat.group.dlq.v1
    EnableIdempotence=true
    BatchNumMessages=1000
    QueueBufferingMaxMs=10
    SessionTimeoutMs=10000
    OutboxBatchSize=100
    OutboxRetryBaseMs=1000
    OutboxRetryMaxMs=30000
    ConsumeRetryMax=5
    [RabbitMQ]
    Host={{ .Values.externalServices.rabbitmq.host }}
    Port={{ .Values.externalServices.rabbitmq.port }}
    Username={{ .Values.externalServices.rabbitmq.username }}
    Password=
    VHost={{ .Values.externalServices.rabbitmq.vhost }}
    PrefetchCount=50
    ExchangeDirect=memochat.direct
    ExchangeDlx=memochat.dlx
    RetryDelayMs=5000
    MaxRetries=5
    [RelationBootstrapCache]
    TtlSec=15
    [Mongo]
    Enabled=true
    Uri={{ .Values.externalServices.mongodb.uri }}
    Database={{ .Values.externalServices.mongodb.database }}
    PrivateCollection=private_messages
    GroupCollection=group_messages
    [Cluster]
    DiscoveryMode=k8s-statefulset
    ServiceName={{ .Values.chat.serviceName }}
    Namespace={{ .Values.namespaces.prod }}
    Replicas={{ .Values.chat.replicaCount }}
    TcpPort={{ .Values.chat.tcpPort }}
    RpcPort={{ .Values.chat.rpcPort }}
    Domain={{ .Values.global.clusterDomain }}
    [Log]
    Level=info
    Dir=/var/log/memochat/chat
    Format=json
    ToConsole=true
    RotateMode=daily
    MaxFiles=14
    MaxSizeMB=100
    Redact=true
    Env=k8s
    [Telemetry]
