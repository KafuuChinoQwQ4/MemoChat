apiVersion: v1
kind: ConfigMap
metadata:
  name: memochat-platform-init
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
data:
  init-kafka.py: |
    import os
    import subprocess
    import sys
    topics = [
        "chat.private.v1",
        "chat.group.v1",
        "dialog.sync.v1",
        "relation.state.v1",
        "user.profile.changed.v1",
        "audit.login.v1",
        "chat.private.dlq.v1",
        "chat.group.dlq.v1",
    ]
    subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-cache-dir", "confluent-kafka==2.5.0"])
    from confluent_kafka.admin import AdminClient, NewTopic
    client = AdminClient({"bootstrap.servers": os.environ["KAFKA_BROKERS"]})
    existing = set(client.list_topics(timeout=15).topics.keys())
    new_topics = [NewTopic(topic, num_partitions=6, replication_factor=1) for topic in topics if topic not in existing]
    if new_topics:
        futures = client.create_topics(new_topics)
        for _, future in futures.items():
            future.result()
  init-rabbitmq.py: |
    import os
    import subprocess
    import sys
    subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-cache-dir", "pika==1.3.2"])
    import pika
    credentials = pika.PlainCredentials(os.environ["RABBITMQ_USERNAME"], os.environ["RABBITMQ_PASSWORD"])
    parameters = pika.ConnectionParameters(
        host=os.environ["RABBITMQ_HOST"],
        port=int(os.environ["RABBITMQ_PORT"]),
        virtual_host=os.environ.get("RABBITMQ_VHOST", "/"),
        credentials=credentials,
    )
    connection = pika.BlockingConnection(parameters)
    channel = connection.channel()
    channel.exchange_declare(exchange="memochat.direct", exchange_type="direct", durable=True)
    channel.exchange_declare(exchange="memochat.dlx", exchange_type="direct", durable=True)
    channel.queue_declare(queue="verify.email.delivery.q", durable=True, arguments={"x-dead-letter-exchange": "memochat.dlx"})
    channel.queue_bind(queue="verify.email.delivery.q", exchange="memochat.direct", routing_key="verify.email.delivery")
    channel.queue_declare(queue="verify.email.delivery.retry.q", durable=True)
    channel.queue_bind(queue="verify.email.delivery.retry.q", exchange="memochat.direct", routing_key="verify.email.delivery.retry")
    channel.queue_declare(queue="verify.email.delivery.dlq.q", durable=True)
    channel.queue_bind(queue="verify.email.delivery.dlq.q", exchange="memochat.dlx", routing_key="verify.email.delivery.dlq")
    connection.close()
  001_business_baseline.sql: |
    CREATE SCHEMA IF NOT EXISTS memo;
  009_memo_account_schema.sql: |
    CREATE SCHEMA IF NOT EXISTS memo;
    CREATE TABLE IF NOT EXISTS memo."user" (
      id integer GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      uid integer DEFAULT 0 NOT NULL,
      name character varying(255) DEFAULT '' NOT NULL,
      email character varying(255) DEFAULT '' NOT NULL,
      pwd character varying(255) DEFAULT '' NOT NULL,
      password_hash text DEFAULT '' NOT NULL,
      nick character varying(255) DEFAULT '' NOT NULL,
      "desc" character varying(255) DEFAULT '' NOT NULL,
      sex integer DEFAULT 0 NOT NULL,
      icon character varying(255) DEFAULT '' NOT NULL,
      user_id character varying(10),
      adult_attested_at_ms bigint DEFAULT 0 NOT NULL,
      r18_access_state smallint DEFAULT 0 NOT NULL,
      CONSTRAINT uq_user_email UNIQUE (email),
      CONSTRAINT uq_user_uid UNIQUE (uid),
      CONSTRAINT uq_user_user_id UNIQUE (user_id),
      CONSTRAINT ck_user_r18_access_state CHECK (r18_access_state IN (0, 1, 2)),
      CONSTRAINT ck_user_adult_attested_at_ms CHECK (adult_attested_at_ms >= 0)
    );
    CREATE INDEX IF NOT EXISTS idx_user_name ON memo."user" (name);
    CREATE TABLE IF NOT EXISTS memo.user_id (id integer NOT NULL PRIMARY KEY);
    CREATE TABLE IF NOT EXISTS memo.auth_refresh_token (
      id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      uid integer NOT NULL,
      selector text NOT NULL,
      verifier_hash text NOT NULL,
      issued_at timestamptz NOT NULL DEFAULT CURRENT_TIMESTAMP,
      expires_at timestamptz NOT NULL,
      rotated_at timestamptz,
      revoked_at timestamptz,
      replaced_by_selector text,
      user_agent text NOT NULL DEFAULT '',
      ip_hash text NOT NULL DEFAULT '',
      CONSTRAINT uq_auth_refresh_token_selector UNIQUE (selector),
      CONSTRAINT fk_auth_refresh_token_uid FOREIGN KEY (uid) REFERENCES memo."user"(uid) ON DELETE CASCADE
    );
    CREATE INDEX IF NOT EXISTS idx_auth_refresh_token_uid_active
      ON memo.auth_refresh_token(uid) WHERE revoked_at IS NULL AND rotated_at IS NULL;
    CREATE INDEX IF NOT EXISTS idx_auth_refresh_token_expires_at ON memo.auth_refresh_token(expires_at);
    GRANT USAGE ON SCHEMA memo TO memo_account_app;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA memo TO memo_account_app;
    GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA memo TO memo_account_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA memo
      GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO memo_account_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA memo
      GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO memo_account_app;
  013_r18_access_policy.sql: |
    ALTER TABLE IF EXISTS memo."user"
      ADD COLUMN IF NOT EXISTS adult_attested_at_ms bigint NOT NULL DEFAULT 0,
      ADD COLUMN IF NOT EXISTS r18_access_state smallint NOT NULL DEFAULT 0;
    DO $$
    DECLARE
      user_table regclass := to_regclass('memo."user"');
    BEGIN
      IF user_table IS NOT NULL THEN
        IF NOT EXISTS (
          SELECT 1 FROM pg_constraint
          WHERE conname = 'ck_user_r18_access_state' AND conrelid = user_table
        ) THEN
          ALTER TABLE memo."user" ADD CONSTRAINT ck_user_r18_access_state
            CHECK (r18_access_state IN (0, 1, 2));
        END IF;
        IF NOT EXISTS (
          SELECT 1 FROM pg_constraint
          WHERE conname = 'ck_user_adult_attested_at_ms' AND conrelid = user_table
        ) THEN
          ALTER TABLE memo."user" ADD CONSTRAINT ck_user_adult_attested_at_ms
            CHECK (adult_attested_at_ms >= 0);
        END IF;
      END IF;
    END
    $$;
  002_chat_event_outbox.sql: |
    CREATE TABLE IF NOT EXISTS memo.chat_event_outbox (
      id BIGSERIAL PRIMARY KEY,
      aggregate_type TEXT NOT NULL,
      aggregate_id TEXT NOT NULL,
      event_type TEXT NOT NULL,
      payload JSONB NOT NULL,
      publish_status SMALLINT NOT NULL DEFAULT 0,
      retry_count INT NOT NULL DEFAULT 0,
      next_retry_at TIMESTAMPTZ,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      published_at TIMESTAMPTZ
    );
  001_memo_ops_baseline.sql: |
    CREATE SCHEMA IF NOT EXISTS memo_ops;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.namespaces.observability }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
      zipkin:
    exporters:
      logging:
        verbosity: detailed
    service:
      telemetry:
        metrics:
          address: 0.0.0.0:{{ .Values.otelCollector.service.metricsPort }}
      pipelines:
        traces:
          receivers: [otlp, zipkin]
          exporters: [logging]
