apiVersion: v1
kind: Secret
metadata:
  name: memochat-secrets
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.externalServices.postgres.password | quote }}
  redis-password: {{ .Values.externalServices.redis.password | quote }}
  rabbitmq-password: {{ .Values.externalServices.rabbitmq.password | quote }}
  mysql-password: {{ .Values.externalServices.mysql.password | quote }}
  smtp-pass: {{ .Values.externalServices.smtp.pass | quote }}
  chat-auth-secret: {{ .Values.secrets.chatAuthSecret | quote }}
  livekit-api-key: {{ .Values.secrets.livekitApiKey | quote }}
  livekit-api-secret: {{ .Values.secrets.livekitApiSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: memochat-ops-secrets
  namespace: {{ .Values.namespaces.ops }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.externalServices.postgres.password | quote }}
  redis-password: {{ .Values.externalServices.redis.password | quote }}
