{{- $secretChecks := dict
  "externalServices.postgres.password" .Values.externalServices.postgres.password
  "externalServices.redis.password" .Values.externalServices.redis.password
  "externalServices.mongodb.uri" .Values.externalServices.mongodb.uri
  "externalServices.rabbitmq.username" .Values.externalServices.rabbitmq.username
  "externalServices.rabbitmq.password" .Values.externalServices.rabbitmq.password
  "externalServices.mysql.password" .Values.externalServices.mysql.password
  "externalServices.smtp.pass" .Values.externalServices.smtp.pass
  "externalServices.livekit.apiKey" .Values.externalServices.livekit.apiKey
  "externalServices.livekit.apiSecret" .Values.externalServices.livekit.apiSecret
  "aiOrchestrator.dependencies.neo4jPassword" .Values.aiOrchestrator.dependencies.neo4jPassword
  "secrets.chatAuthSecret" .Values.secrets.chatAuthSecret
  "secrets.livekitApiKey" .Values.secrets.livekitApiKey
  "secrets.livekitApiSecret" .Values.secrets.livekitApiSecret
-}}
{{- range $name, $raw := $secretChecks }}
{{- $value := required (printf "%s is required" $name) $raw }}
{{- $normalized := lower (trim (toString $value)) }}
{{- if or (eq $normalized "") (eq $normalized "change-me") (eq $normalized "guest") (eq $normalized "password") (eq $normalized "123456") }}
{{- fail (printf "%s must be overridden with a production secret" $name) }}
{{- end }}
{{- end }}
{{- if eq (lower (trim (toString .Values.externalServices.postgres.sslMode))) "disable" }}
{{- fail "externalServices.postgres.sslMode must not be disable in the production Helm chart" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: memochat-secrets
  namespace: {{ .Values.namespaces.prod }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "externalServices.postgres.password is required" .Values.externalServices.postgres.password | quote }}
  redis-password: {{ required "externalServices.redis.password is required" .Values.externalServices.redis.password | quote }}
  rabbitmq-password: {{ required "externalServices.rabbitmq.password is required" .Values.externalServices.rabbitmq.password | quote }}
  neo4j-password: {{ required "aiOrchestrator.dependencies.neo4jPassword is required" .Values.aiOrchestrator.dependencies.neo4jPassword | quote }}
  mysql-password: {{ required "externalServices.mysql.password is required" .Values.externalServices.mysql.password | quote }}
  smtp-pass: {{ required "externalServices.smtp.pass is required" .Values.externalServices.smtp.pass | quote }}
  chat-auth-secret: {{ required "secrets.chatAuthSecret is required" .Values.secrets.chatAuthSecret | quote }}
  livekit-api-key: {{ required "secrets.livekitApiKey is required" .Values.secrets.livekitApiKey | quote }}
  livekit-api-secret: {{ required "secrets.livekitApiSecret is required" .Values.secrets.livekitApiSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: memochat-ops-secrets
  namespace: {{ .Values.namespaces.ops }}
  labels:
    {{- include "memochat.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "externalServices.postgres.password is required" .Values.externalServices.postgres.password | quote }}
  redis-password: {{ required "externalServices.redis.password is required" .Values.externalServices.redis.password | quote }}
