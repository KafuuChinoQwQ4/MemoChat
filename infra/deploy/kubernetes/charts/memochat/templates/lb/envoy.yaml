apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-lb-config
  namespace: {{ .Values.namespaces.prod }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 80
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    use_remote_address: true
                    generate_request_id: true
                    always_set_request_id_in_response: true
                    preserve_external_request_id: true
                    route_config:
                      name: cluster_gateway
                      virtual_hosts:
                        - name: gate
                          domains: ["*"]
                          routes:
                            - name: health
                              match:
                                path: /health
                              direct_response:
                                status: 200
                                body:
                                  inline_string: "OK\n"
                            {{- if .Values.focusedGateways.enabled }}
                            - name: auth
                              match:
                                path: /get_varifycode
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: register_backend
                                timeout: 60s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: auth
                              match:
                                path: /get_varifycode
                                headers:
                                  - name: ":method"
                                    exact_match: GET
                              direct_response:
                                status: 405
                                body:
                                  inline_string: "Method Not Allowed\n"
                            - name: auth
                              match:
                                path: /user_register
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: register_backend
                                timeout: 60s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: auth
                              match:
                                path: /reset_pwd
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: register_backend
                                timeout: 60s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: auth
                              match:
                                path: /user_login
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: login_backend
                                timeout: 60s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: ai
                              match:
                                prefix: /ai/chat/stream
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: aigateway_backend
                                timeout: 600s
                                retry_policy:
                                  retry_on: connect-failure,reset,gateway-error
                                  num_retries: 1
                                  per_try_timeout: 30s
                              response_headers_to_add:
                                - header:
                                    key: X-Accel-Buffering
                                    value: "no"
                                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - name: ai
                              match:
                                prefix: /ai/chat/stream
                                headers:
                                  - name: ":method"
                                    exact_match: GET
                              direct_response:
                                status: 405
                                body:
                                  inline_string: "Method Not Allowed\n"
                            - name: ai
                              match:
                                prefix: /ai/
                              route:
                                cluster: aigateway_backend
                                timeout: 300s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 1
                                  per_try_timeout: 30s
                            - name: media
                              match:
                                prefix: /upload_media
                              route:
                                cluster: mediagateway_backend
                                timeout: 600s
                                retry_policy:
                                  retry_on: connect-failure,reset
                                  num_retries: 1
                                  per_try_timeout: 30s
                            - name: media
                              match:
                                prefix: /media/
                              route:
                                cluster: mediagateway_backend
                                timeout: 600s
                                retry_policy:
                                  retry_on: connect-failure,reset
                                  num_retries: 1
                                  per_try_timeout: 30s
                            - name: moments
                              match:
                                prefix: /api/moments/
                              route:
                                cluster: momentsgateway_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: call
                              match:
                                prefix: /api/call/
                              route:
                                cluster: callgateway_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: r18
                              match:
                                prefix: /api/r18/
                              route:
                                cluster: r18gateway_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            - name: profile
                              match:
                                path: /user_update_profile
                                headers:
                                  - name: ":method"
                                    exact_match: POST
                              route:
                                cluster: account_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            {{- end }}
                            {{- if .Values.legacyGate.enabled }}
                            - name: gate_legacy
                              match:
                                prefix: /
                              route:
                                cluster: gate_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                            {{- else }}
                            - name: other
                              match:
                                prefix: /
                              direct_response:
                                status: 404
                                body:
                                  inline_string: "Not Found\n"
                            {{- end }}
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        - name: listener_chat_8090
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8090
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8091
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8091
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8091
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
      clusters:
        {{- if .Values.focusedGateways.enabled }}
        - name: aigateway_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: aigateway_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.aigateway.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.aigateway.port }}
        - name: mediagateway_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: mediagateway_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.mediagateway.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.mediagateway.port }}
        - name: momentsgateway_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: momentsgateway_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.momentsgateway.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.momentsgateway.port }}
        - name: callgateway_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: callgateway_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.callgateway.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.callgateway.port }}
        - name: r18gateway_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: r18gateway_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.r18gateway.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.r18gateway.port }}
        - name: register_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: register_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.register.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.register.port }}
        - name: login_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: login_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.login.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.login.port }}
        - name: account_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: account_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.focusedGateways.services.account.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.focusedGateways.services.account.port }}
        {{- end }}
        {{- if .Values.legacyGate.enabled }}
        - name: gate_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: gate_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: gateserver.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.gate.service.port }}
        {{- end }}
        - name: chat_tcp_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: RING_HASH
          load_assignment:
            cluster_name: chat_tcp_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.chat.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.chat.tcpPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-lb
  namespace: {{ .Values.namespaces.prod }}
  labels:
    app: envoy-lb
    tier: loadbalancer
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy-lb
      {{- include "memochat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: envoy-lb
        tier: loadbalancer
        {{- include "memochat.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: envoy
          image: "{{ .Values.images.envoy.repository }}:{{ .Values.images.envoy.tag }}"
          imagePullPolicy: {{ .Values.images.envoy.pullPolicy }}
          command:
            - envoy
          args:
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: chat-tcp-1
              containerPort: 8090
              protocol: TCP
            - name: chat-tcp-2
              containerPort: 8091
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
      volumes:
        - name: config
          configMap:
            name: envoy-lb-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-lb
  namespace: {{ .Values.namespaces.prod }}
spec:
  type: LoadBalancer
  selector:
    app: envoy-lb
    {{- include "memochat.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: chat-tcp-1
      port: 8090
      targetPort: 8090
      protocol: TCP
    - name: chat-tcp-2
      port: 8091
      targetPort: 8091
      protocol: TCP
