apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-lb-config
  namespace: {{ .Values.namespaces.prod }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 80
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    use_remote_address: true
                    generate_request_id: true
                    always_set_request_id_in_response: true
                    preserve_external_request_id: true
                    route_config:
                      name: cluster_gateway
                      virtual_hosts:
                        - name: gate
                          domains: ["*"]
                          routes:
                            - name: health
                              match:
                                path: /health
                              direct_response:
                                status: 200
                                body:
                                  inline_string: "OK\n"
                            - name: gate
                              match:
                                prefix: /
                              route:
                                cluster: gate_backend
                                timeout: 120s
                                retry_policy:
                                  retry_on: connect-failure,reset,5xx,gateway-error
                                  num_retries: 2
                                  per_try_timeout: 15s
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        - name: listener_chat_8090
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8090
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8091
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8091
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8091
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8092
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8092
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8092
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8093
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8093
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8093
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8094
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8094
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8094
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
        - name: listener_chat_8097
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8097
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: chat_tcp_8097
                    cluster: chat_tcp_backend
                    idle_timeout: 3600s
                    hash_policy:
                      - source_ip: {}
      clusters:
        - name: gate_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: LEAST_REQUEST
          load_assignment:
            cluster_name: gate_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: gateserver.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.gate.service.port }}
        - name: chat_tcp_backend
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: RING_HASH
          load_assignment:
            cluster_name: chat_tcp_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.chat.serviceName }}.{{ .Values.namespaces.prod }}.svc.{{ .Values.global.clusterDomain }}
                          port_value: {{ .Values.chat.tcpPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-lb
  namespace: {{ .Values.namespaces.prod }}
  labels:
    app: envoy-lb
    tier: loadbalancer
    {{- include "memochat.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy-lb
      {{- include "memochat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: envoy-lb
        tier: loadbalancer
        {{- include "memochat.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: envoy
          image: "{{ .Values.images.envoy.repository }}:{{ .Values.images.envoy.tag }}"
          imagePullPolicy: {{ .Values.images.envoy.pullPolicy }}
          command:
            - envoy
          args:
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: chat-tcp-1
              containerPort: 8090
              protocol: TCP
            - name: chat-tcp-2
              containerPort: 8091
              protocol: TCP
            - name: chat-tcp-3
              containerPort: 8092
              protocol: TCP
            - name: chat-tcp-4
              containerPort: 8093
              protocol: TCP
            - name: chat-tcp-5
              containerPort: 8094
              protocol: TCP
            - name: chat-tcp-6
              containerPort: 8097
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
      volumes:
        - name: config
          configMap:
            name: envoy-lb-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-lb
  namespace: {{ .Values.namespaces.prod }}
spec:
  type: LoadBalancer
  selector:
    app: envoy-lb
    {{- include "memochat.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: chat-tcp-1
      port: 8090
      targetPort: 8090
      protocol: TCP
    - name: chat-tcp-2
      port: 8091
      targetPort: 8091
      protocol: TCP
    - name: chat-tcp-3
      port: 8092
      targetPort: 8092
      protocol: TCP
    - name: chat-tcp-4
      port: 8093
      targetPort: 8093
      protocol: TCP
    - name: chat-tcp-5
      port: 8094
      targetPort: 8094
      protocol: TCP
    - name: chat-tcp-6
      port: 8097
      targetPort: 8097
      protocol: TCP
