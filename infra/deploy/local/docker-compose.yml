name: memochat

services:
  #######################
  # Local Envoy Gateway
  #######################
  memochat-envoy-certgen:
    image: envoyproxy/envoy:v1.38.0
    container_name: memochat-envoy-certgen
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - /bin/sh /scripts/generate-envoy-certs.sh
    volumes:
      - ./compose/generate-envoy-certs.sh:/scripts/generate-envoy-certs.sh:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/envoy/certs:/certs

  memochat-envoy-gateway:
    image: envoyproxy/envoy:v1.38.0
    container_name: memochat-envoy-gateway
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    ports:
      - "80:80"
      - "8443:8443/tcp"
      - "8443:8443/udp"
    volumes:
      - ./compose/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/envoy/certs:/etc/envoy/certs:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/envoy/logs:/var/log/envoy
    command:
      - exec envoy -c /etc/envoy/envoy.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "host-gateway:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "envoy --mode validate -c /etc/envoy/envoy.yaml >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      memochat-envoy-certgen:
        condition: service_completed_successfully

  #######################
  # Data Stores
  #######################
  memochat-redis:
    image: redis/redis-stack-server:7.2.0-v15
    container_name: memochat-redis
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--appendonly yes --requirepass ${MEMOCHAT_REDIS_PASSWORD:-123456}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/redis:/data

  memochat-postgres:
    image: postgres:16
    container_name: memochat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memochat
      POSTGRES_PASSWORD: "${MEMOCHAT_POSTGRES_PASSWORD:-123456}"
      POSTGRES_DB: memo_pg
    command:
      - postgres
      - -c
      - max_connections=500
      - -c
      - shared_buffers=256MB
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/postgres:/var/lib/postgresql/data

  memochat-mongo:
    image: mongo:7.0
    container_name: memochat-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MEMOCHAT_MONGO_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MEMOCHAT_MONGO_ROOT_PASSWORD:-123456}"
      MONGO_INITDB_DATABASE: memochat
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/mongo:/data/db

  memochat-minio:
    image: minio/minio:latest
    container_name: memochat-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MEMOCHAT_MINIO_ROOT_USER:-memochat_admin}"
      MINIO_ROOT_PASSWORD: "${MEMOCHAT_MINIO_ROOT_PASSWORD:-MinioPass2026!}"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  #######################
  # Message Queue
  #######################
  memochat-redpanda:
    image: redpandadata/redpanda:v24.2.6
    container_name: memochat-redpanda
    restart: unless-stopped
    ports:
      - "127.0.0.1:19092:19092"
      - "127.0.0.1:18082:18082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr=INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://memochat-redpanda:9092,OUTSIDE://127.0.0.1:19092
      - --pandaproxy-addr=0.0.0.0:18082
      - --advertise-pandaproxy-addr=127.0.0.1:18082
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/redpanda/data:/var/lib/redpanda/data

  memochat-rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: memochat-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${MEMOCHAT_RABBITMQ_USER:-memochat}"
      RABBITMQ_DEFAULT_PASS: "${MEMOCHAT_RABBITMQ_PASSWORD:-123456}"
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/rabbitmq:/var/lib/rabbitmq

  #######################
  # Observability
  #######################
  memochat-prometheus:
    image: prom/prometheus:v2.54.1
    container_name: memochat-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - memochat-influxdb
      - memochat-alertmanager
      - memochat-envoy-gateway

  memochat-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: memochat-alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/alertmanager:/alertmanager
    extra_hosts:
      - "host.docker.internal:host-gateway"

  memochat-influxdb:
    image: influxdb:2.7-alpine
    container_name: memochat-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${MEMOCHAT_INFLUXDB_USERNAME:-admin}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${MEMOCHAT_INFLUXDB_PASSWORD:-adminadmin}"
      DOCKER_INFLUXDB_INIT_ORG: memochat
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${MEMOCHAT_INFLUXDB_ADMIN_TOKEN:-my-super-secret-admin-token}"
    volumes:
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/influxdb:/var/lib/influxdb2
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/influxdb/config:/etc/influxdb2
    extra_hosts:
      - "host.docker.internal:host-gateway"

  memochat-grafana:
    image: grafana/grafana:11.1.4
    container_name: memochat-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${MEMOCHAT_GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${MEMOCHAT_GRAFANA_ADMIN_PASSWORD:-admin}"
      MEMOCHAT_INFLUXDB_ADMIN_TOKEN: "${MEMOCHAT_INFLUXDB_ADMIN_TOKEN:-my-super-secret-admin-token}"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/grafana:/var/lib/grafana

  memochat-loki:
    image: grafana/loki:3.1.1
    container_name: memochat-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/loki:/loki

  memochat-tempo:
    image: grafana/tempo:2.5.0
    container_name: memochat-tempo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"
    command:
      - -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/observability/tempo:/var/tempo

  memochat-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: memochat-otel-collector
    restart: unless-stopped
    depends_on:
      - memochat-loki
      - memochat-tempo
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:9411:9411"
      - "127.0.0.1:9464:9464"
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./observability/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ../../Memo_ops/runtime:/workspace/Memo_ops/runtime:ro
      - ../../../build/bin:/workspace/build/bin:ro
      - ${MEMOCHAT_DOCKER_DATA_ROOT:-/data/docker-data/memochat}/envoy/logs:/workspace/envoy/logs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  memochat-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: memochat-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
