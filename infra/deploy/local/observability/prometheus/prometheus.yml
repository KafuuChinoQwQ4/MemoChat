global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["memochat-alertmanager:9093"]

remote_write:
  - url: http://memochat-influxdb:8086/api/v1/write
    headers:
      X-Organization-Id: memochat

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["memochat-prometheus:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["memochat-cadvisor:8080"]

  - job_name: ai_orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8096"]

  - job_name: otel_collector
    static_configs:
      - targets: ["memochat-otel-collector:9464"]

  # Optional local exporters. Enable these only when the matching process or
  # profile is running, otherwise Prometheus target health becomes noisy.
  #
  # - job_name: windows_exporter
  #   static_configs:
  #     - targets: ["host.docker.internal:9182"]
  #
  # - job_name: memo_ops_collector
  #   static_configs:
  #     - targets: ["host.docker.internal:19100"]
  #
  # - job_name: dcgm_exporter
  #   static_configs:
  #     - targets: ["memochat-dcgm-exporter:9400"]
