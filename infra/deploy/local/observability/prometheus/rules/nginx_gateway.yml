groups:
  - name: memochat-nginx-gateway
    rules:
      - alert: NginxGatewayScrapeMissing
        expr: absent(up{job="nginx_gateway"})
        for: 2m
        labels:
          severity: critical
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway scrape target is missing"
          description: "Prometheus has no up{} series for job=nginx_gateway. Check the Prometheus scrape config and the memochat-nginx-exporter service."

      - alert: NginxGatewayExporterDown
        expr: up{job="nginx_gateway"} == 0
        for: 2m
        labels:
          severity: critical
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway exporter is down"
          description: "Prometheus cannot scrape memochat-nginx-exporter on {{ $labels.instance }}."

      - alert: NginxGatewayNginxDown
        expr: nginx_up{job="nginx_gateway"} == 0
        for: 2m
        labels:
          severity: critical
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway status endpoint is down"
          description: "The exporter is reachable, but it cannot scrape the Nginx stub_status endpoint for {{ $labels.instance }}."

      - alert: NginxGatewayHighActiveConnections
        expr: nginx_connections_active{job="nginx_gateway"} > 200
        for: 10m
        labels:
          severity: warning
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway active connections are high"
          description: "Nginx has more than 200 active connections for 10 minutes on {{ $labels.instance }}, which is unusual for local development."

      - alert: NginxGatewayRequestCounterStalled
        expr: |
          nginx_up{job="nginx_gateway"} == 1
          and
          increase(nginx_http_requests_total{job="nginx_gateway"}[30m]) == 0
        for: 15m
        labels:
          severity: warning
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway request counter is stalled"
          description: "The Nginx gateway is up, but the exported request counter has not increased for 30 minutes on {{ $labels.instance }}."

      - alert: NginxGatewayConnectionSaturation
        expr: |
          (
            nginx_connections_reading{job="nginx_gateway"}
            + nginx_connections_writing{job="nginx_gateway"}
          )
          /
          clamp_min(nginx_connections_active{job="nginx_gateway"}, 1) > 0.85
          and
          nginx_connections_active{job="nginx_gateway"} > 50
        for: 10m
        labels:
          severity: warning
          service: nginx_gateway
        annotations:
          summary: "Nginx gateway connection saturation warning"
          description: "More than 85% of active Nginx connections are busy reading or writing for 10 minutes on {{ $labels.instance }}."
