global:
  resolve_timeout: 5m

route:
  receiver: memo_ops
  group_by:
    - alertname
    - service
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 30m

receivers:
  - name: memo_ops
    webhook_configs:
      - url: http://host.docker.internal:19100/api/alerts/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service
