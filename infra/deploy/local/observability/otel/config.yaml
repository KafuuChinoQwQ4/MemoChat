receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  zipkin:
    endpoint: 0.0.0.0:9411
  filelog:
    include:
      - /workspace/Memo_ops/runtime/**/*.json
      - /workspace/build/bin/**/*.json
    start_at: end
    operators:
      - type: json_parser
        parse_from: body
  filelog/envoy:
    include:
      - /workspace/envoy/logs/access.json
    start_at: end
    operators:
      - type: json_parser
        parse_from: body
        parse_to: attributes

processors:
  attributes/envoy_loki:
    actions:
      - key: service
        value: memochat-envoy-gateway
        action: upsert
      - key: component
        value: envoy_gateway
        action: upsert
      - key: loki.attribute.labels
        value: service,component
        action: insert
  batch:

exporters:
  debug:
    verbosity: normal
  otlp/tempo:
    endpoint: memochat-tempo:4317
    tls:
      insecure: true
  loki:
    endpoint: http://memochat-loki:3100/loki/api/v1/push

service:
  telemetry:
    metrics:
      address: 0.0.0.0:9464
  pipelines:
    traces:
      receivers: [otlp, zipkin]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    logs:
      receivers: [filelog]
      processors: [batch]
      exporters: [loki, debug]
    logs/envoy:
      receivers: [filelog/envoy]
      processors: [attributes/envoy_loki, batch]
      exporters: [loki]
