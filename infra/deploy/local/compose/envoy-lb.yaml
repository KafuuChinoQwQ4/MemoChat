admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                use_remote_address: true
                generate_request_id: true
                always_set_request_id_in_response: true
                preserve_external_request_id: true
                route_config:
                  name: cluster_gateway
                  virtual_hosts:
                    - name: gate
                      domains: ["*"]
                      routes:
                        - name: health
                          match:
                            path: /health
                          direct_response:
                            status: 200
                            body:
                              inline_string: "OK\n"
                        - name: gate
                          match:
                            prefix: /
                          route:
                            cluster: gate_backend
                            timeout: 120s
                            retry_policy:
                              retry_on: connect-failure,reset,5xx,gateway-error
                              num_retries: 2
                              per_try_timeout: 15s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
    - name: listener_chat_8090
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8090
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: chat_tcp_8090
                cluster: chat_tcp_backend
                idle_timeout: 3600s
                hash_policy:
                  - source_ip: {}
  clusters:
    - name: gate_backend
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: LEAST_REQUEST
      load_assignment:
        cluster_name: gate_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: gate-server-1
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: gate-server-2
                      port_value: 8080
    - name: chat_tcp_backend
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      load_assignment:
        cluster_name: chat_tcp_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chat-server-1
                      port_value: 8090
