services:
  envoy-lb:
    image: envoyproxy/envoy:v1.38.0
    container_name: memochat-envoy-lb
    restart: unless-stopped
    ports:
      - "80:80"
      - "8090:8090"
    volumes:
      - ./envoy-lb.yaml:/etc/envoy/envoy.yaml:ro
    entrypoint: ["envoy"]
    command: ["-c", "/etc/envoy/envoy.yaml"]
    networks:
      - memochat-net
    healthcheck:
      test: ["CMD-SHELL", "envoy --mode validate -c /etc/envoy/envoy.yaml >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gate-server-1:
    image: memochat/gate-server:latest
    container_name: memochat-gate-1
    environment:
      - GATESERVER_PORT=8080
      - CLUSTER_NODES=chatserver1
      - REDIS_HOST=memochat-redis
      - POSTGRES_HOST=memochat-postgres
    networks:
      - memochat-net

  gate-server-2:
    image: memochat/gate-server:latest
    container_name: memochat-gate-2
    environment:
      - GATESERVER_PORT=8080
      - CLUSTER_NODES=chatserver1
      - REDIS_HOST=memochat-redis
      - POSTGRES_HOST=memochat-postgres
    networks:
      - memochat-net

  chat-server-1:
    image: memochat/chat-server:latest
    container_name: memochat-chat-1
    environment:
      - SERVER_NAME=chatserver1
      - TCP_PORT=8090
      - QUIC_PORT=8190
      - RPC_PORT=50055
      - CLUSTER_NODES=chatserver1
      - REDIS_HOST=memochat-redis
      - POSTGRES_HOST=memochat-postgres
    networks:
      - memochat-net

networks:
  memochat-net:
    external: true
