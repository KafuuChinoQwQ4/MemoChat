# MemoChat local Nginx gateway.
# Proxies host port 80 to GateServer instances started by the Windows runtime.
# `memochat-host-gateway-ipv4` is derived at container startup from Docker's
# host-gateway entry and keeps Nginx upstream resolution on IPv4 only.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $args $nginx_query_present {
        default true;
        '' false;
    }

    map $uri $nginx_route_family {
        default other;
        /get_varifycode auth;
        /user_login auth;
        /user_register auth;
        /reset_pwd auth;
        /__nginx_loki_probe gateway_probe;
        /health health;
        ~^/ai/ ai;
        ~^/upload_media media;
        ~^/media/download media;
    }

    map $status $nginx_status_class {
        default other;
        ~^1 1xx;
        ~^2 2xx;
        ~^3 3xx;
        ~^4 4xx;
        ~^5 5xx;
    }

    log_format json_main escape=json
                    '{'
                    '"ts":"$time_iso8601",'
                    '"service":"memochat-nginx-lb",'
                    '"request_id":"$proxy_request_id",'
                    '"trace_id":"$proxy_trace_id",'
                    '"remote_addr":"$remote_addr",'
                    '"method":"$request_method",'
                    '"uri_path":"$uri",'
                    '"query_present":$nginx_query_present,'
                    '"route_family":"$nginx_route_family",'
                    '"status":"$status",'
                    '"status_class":"$nginx_status_class",'
                    '"bytes_sent":"$bytes_sent",'
                    '"body_bytes_sent":"$body_bytes_sent",'
                    '"request_time":"$request_time",'
                    '"upstream_addr":"$upstream_addr",'
                    '"upstream_status":"$upstream_status",'
                    '"upstream_response_time":"$upstream_response_time",'
                    '"upstream_connect_time":"$upstream_connect_time",'
                    '"host":"$host",'
                    '"user_agent":"$http_user_agent",'
                    '"x_forwarded_for":"$proxy_add_x_forwarded_for"'
                    '}';

    access_log /var/log/nginx/access.log json_main;
    access_log /var/log/memochat/nginx/access.json json_main;
    sendfile on;
    keepalive_timeout 65s;
    client_max_body_size 16m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_request_id $proxy_request_id {
        default $http_x_request_id;
        '' $request_id;
    }

    map $http_x_trace_id $proxy_trace_id {
        default $http_x_trace_id;
        '' $request_id;
    }

    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=30r/m;
    limit_req_status 429;

    upstream gate_backend {
        least_conn;
        server memochat-host-gateway-ipv4:8080 max_fails=3 fail_timeout=10s;
        server memochat-host-gateway-ipv4:8084 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;
        access_log off;
        return 444;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 host.docker.internal;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $proxy_request_id;
        proxy_set_header X-Trace-Id $proxy_trace_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        add_header X-Request-Id $proxy_request_id always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "OK\n";
        }

        location = /__nginx_loki_probe {
            default_type text/plain;
            return 200 "OK\n";
        }

        location = /get_varifycode {
            if ($request_method != POST) { return 405; }
            client_max_body_size 64k;
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://gate_backend;
        }

        location = /user_login {
            if ($request_method != POST) { return 405; }
            client_max_body_size 64k;
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://gate_backend;
        }

        location = /user_register {
            if ($request_method != POST) { return 405; }
            client_max_body_size 128k;
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://gate_backend;
        }

        location = /reset_pwd {
            if ($request_method != POST) { return 405; }
            client_max_body_size 128k;
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://gate_backend;
        }

        location = /ai/chat/stream {
            if ($request_method != POST) { return 405; }
            client_max_body_size 2m;
            proxy_buffering off;
            add_header X-Request-Id $proxy_request_id always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            add_header X-Accel-Buffering no always;
            proxy_send_timeout 300s;
            proxy_read_timeout 600s;
            proxy_next_upstream off;
            proxy_pass http://gate_backend;
        }

        location /ai/ {
            client_max_body_size 2m;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_pass http://gate_backend;
        }

        location /upload_media {
            if ($request_method !~ ^(GET|POST)$) { return 405; }
            client_max_body_size 2G;
            proxy_request_buffering off;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_next_upstream error timeout;
            proxy_pass http://gate_backend;
        }

        location /media/download {
            if ($request_method != GET) { return 405; }
            client_max_body_size 2G;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_next_upstream error timeout;
            proxy_pass http://gate_backend;
        }

        location / {
            proxy_pass http://gate_backend;
        }
    }

    server {
        listen 8081;
        server_name localhost;
        access_log off;

        location = /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
