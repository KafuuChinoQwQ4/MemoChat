                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        function envoy_on_request(handle)
                          local headers = handle:headers()
                          local path = headers:get(":path") or "/"
                          local q = string.find(path, "?", 1, true)
                          local uri = path
                          if q then
                            uri = string.sub(path, 1, q - 1)
                            headers:replace("x-memochat-query-present", "true")
                          else
                            headers:replace("x-memochat-query-present", "false")
                          end
                          headers:replace("x-memochat-uri-path", uri)
                        end

                        function envoy_on_response(handle)
                          local headers = handle:headers()
                          local status = tonumber(headers:get(":status") or "0") or 0
                          local class = "other"
                          if status >= 100 and status < 200 then
                            class = "1xx"
                          elseif status >= 200 and status < 300 then
                            class = "2xx"
                          elseif status >= 300 and status < 400 then
                            class = "3xx"
                          elseif status >= 400 and status < 500 then
                            class = "4xx"
                          elseif status >= 500 and status < 600 then
                            class = "5xx"
                          end
                          headers:replace("x-memochat-status-class", class)
                        end
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: global_local_rate_limiter
                      token_bucket:
                        max_tokens: 100000
                        tokens_per_fill: 100000
                        fill_interval: 1s
                      filter_enabled:
                        default_value:
                          numerator: 0
                          denominator: HUNDRED
                        runtime_key: local_rate_limit_enabled
                      filter_enforced:
                        default_value:
                          numerator: 0
                          denominator: HUNDRED
                        runtime_key: local_rate_limit_enforced
                  - name: envoy.filters.http.router
