# MemoChat Nginx Configuration
# HTTP/TCP Load Balancer for Docker/K8s

# Run in foreground
daemon off;

# Worker processes
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# HTTP Load Balancing for GateServer
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # GateServer upstream - HTTP API load balancing
    # Use environment variables for K8s service discovery
    upstream gate_backend {
        least_conn;
        server ${GATE_SERVER_1:gate-server-1:8080};
        server ${GATE_SERVER_2:gate-server-2:8080};
    }

    # Legacy GateServer upstream (for comparison/testing)
    upstream gate_backend_legacy {
        least_conn;
        server ${GATE_SERVER_1:gate-server-1:8080};
        server ${GATE_SERVER_2:gate-server-2:8080};
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # GateServer HTTP proxy
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://gate_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection upgrade for WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}

# TCP/QUIC Stream Load Balancing for ChatServer
stream {
    log_format stream '$remote_addr [$time_local] '
                      '$protocol $status $bytes_sent $bytes_received '
                      '$session_time';

    access_log /var/log/nginx/stream-access.log stream;

    # ChatServer TCP upstream - maintains session affinity
    upstream chat_tcp_backend {
        hash $remote_addr consistent;
        server ${CHAT_SERVER_1:chat-server-1:8090};
        server ${CHAT_SERVER_2:chat-server-2:8091};
        server ${CHAT_SERVER_3:chat-server-3:8092};
        server ${CHAT_SERVER_4:chat-server-4:8093};
        server ${CHAT_SERVER_5:chat-server-5:8094};
        server ${CHAT_SERVER_6:chat-server-6:8097};
    }

    # ChatServer QUIC upstream (for future use)
    upstream chat_quic_backend {
        hash $remote_addr consistent;
        server ${QUIC_SERVER_1:chat-server-1:8190};
        server ${QUIC_SERVER_2:chat-server-2:8191};
        server ${QUIC_SERVER_3:chat-server-3:8192};
        server ${QUIC_SERVER_4:chat-server-4:8193};
        server ${QUIC_SERVER_5:chat-server-5:8194};
        server ${QUIC_SERVER_6:chat-server-6:8195};
    }

    # TCP load balancing
    server {
        listen 8090;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }

    server {
        listen 8091;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }

    server {
        listen 8092;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }

    server {
        listen 8093;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }

    server {
        listen 8094;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }

    server {
        listen 8097;
        proxy_pass chat_tcp_backend;
        proxy_timeout 3600s;
        proxy_buffer_size 4k;
    }
}
