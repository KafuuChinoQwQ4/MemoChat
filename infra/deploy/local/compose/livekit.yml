version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "123456"]
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command:
      - --dev
      - --bind
      - 0.0.0.0
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    ports:
      - "7880:7880"
      - "7881:7881/udp"
    depends_on:
      - redis

  coturn:
    image: coturn/coturn:latest
    command:
      - -n
      - --log-file=stdout
      - --realm=memochat.local
      - --user=memochat:123456
      - --external-ip=127.0.0.1
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478"
      - "49160-49200:49160-49200/udp"
