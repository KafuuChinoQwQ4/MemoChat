apiVersion: v1
kind: Service
metadata:
  name: memochat-statusserver
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: statusserver
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
  selector:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: statusserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memochat-statusserver
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: statusserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: memochat
      app.kubernetes.io/component: statusserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memochat
        app.kubernetes.io/component: statusserver
    spec:
      containers:
        - name: statusserver
          image: memochat/statusserver:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: MEMOCHAT_INSTANCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MEMOCHAT_CLUSTER_DISCOVERYMODE
              value: "etcd"
            - name: MEMOCHAT_CLUSTER_ETCDENDPOINTS
              value: "http://memochat-etcd:2379"
            - name: MEMOCHAT_POSTGRES_HOST
              value: "memochat-postgres"
            - name: MEMOCHAT_REDIS_HOST
              value: "memochat-redis"
            - name: MEMOCHAT_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
