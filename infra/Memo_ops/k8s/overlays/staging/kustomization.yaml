apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: memochat-staging

bases:
  - ../../base
  - ../../etcd
  - ../../backend
  - ../../infra

resources:
  - mesh-istio.yaml
  - external-secrets.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: memochat-gateserver
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: memochat-gateserver
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: memochat-varifyserver
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: memochat-varifyserver
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: memochat-chatserver
      spec:
        replicas: 1
    target:
      kind: StatefulSet
      name: memochat-chatserver

configMapGenerator:
  - name: memochat-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - ETCD_ENDPOINTS=https://memochat-etcd:2379

images:
  - name: memochat/gateserver
    newTag: staging-latest
  - name: memochat/chatserver
    newTag: staging-latest
  - name: memochat/varifyserver
    newTag: staging-latest
