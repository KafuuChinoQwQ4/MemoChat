apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: memochat-vault
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
spec:
  provider:
    vault:
      server: "https://vault.example.internal"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "memochat-prod"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-vault
    kind: ClusterSecretStore
  target:
    name: memochat-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: memochat/prod/app, property: postgres-password }
    - secretKey: redis-password
      remoteRef: { key: memochat/prod/app, property: redis-password }
    - secretKey: mongodb-uri
      remoteRef: { key: memochat/prod/app, property: mongodb-uri }
    - secretKey: rabbitmq-username
      remoteRef: { key: memochat/prod/app, property: rabbitmq-username }
    - secretKey: rabbitmq-password
      remoteRef: { key: memochat/prod/app, property: rabbitmq-password }
    - secretKey: neo4j-password
      remoteRef: { key: memochat/prod/app, property: neo4j-password }
    - secretKey: mysql-password
      remoteRef: { key: memochat/prod/app, property: mysql-password }
    - secretKey: smtp-pass
      remoteRef: { key: memochat/prod/app, property: smtp-pass }
    - secretKey: chat-auth-secret
      remoteRef: { key: memochat/prod/app, property: chat-auth-secret }
    - secretKey: auth-refresh-pepper
      remoteRef: { key: memochat/prod/app, property: auth-refresh-pepper }
    - secretKey: livekit-api-key
      remoteRef: { key: memochat/prod/app, property: livekit-api-key }
    - secretKey: livekit-api-secret
      remoteRef: { key: memochat/prod/app, property: livekit-api-secret }
    - secretKey: minio-access-key
      remoteRef: { key: memochat/prod/app, property: minio-access-key }
    - secretKey: minio-secret-key
      remoteRef: { key: memochat/prod/app, property: minio-secret-key }
    - secretKey: ai-internal-api-key
      remoteRef: { key: memochat/prod/app, property: ai-internal-api-key }
    - secretKey: ai-provider-admin-key
      remoteRef: { key: memochat/prod/app, property: ai-provider-admin-key }
    - secretKey: r18-picacg-api-key
      remoteRef: { key: memochat/prod/app, property: r18-picacg-api-key }
    - secretKey: r18-picacg-hmac-key
      remoteRef: { key: memochat/prod/app, property: r18-picacg-hmac-key }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-ops-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-vault
    kind: ClusterSecretStore
  target:
    name: memochat-ops-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: memochat/prod/ops, property: postgres-password }
    - secretKey: redis-password
      remoteRef: { key: memochat/prod/ops, property: redis-password }
    - secretKey: mysql-user
      remoteRef: { key: memochat/prod/ops, property: mysql-user }
    - secretKey: mysql-password
      remoteRef: { key: memochat/prod/ops, property: mysql-password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-etcd-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-vault
    kind: ClusterSecretStore
  target:
    name: memochat-etcd-secrets
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef: { key: memochat/prod/etcd, property: root-password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memochat-etcd-tls
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-vault
    kind: ClusterSecretStore
  target:
    name: memochat-etcd-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: ca.crt
      remoteRef: { key: memochat/prod/etcd-tls, property: ca.crt }
    - secretKey: tls.crt
      remoteRef: { key: memochat/prod/etcd-tls, property: tls.crt }
    - secretKey: tls.key
      remoteRef: { key: memochat/prod/etcd-tls, property: tls.key }
