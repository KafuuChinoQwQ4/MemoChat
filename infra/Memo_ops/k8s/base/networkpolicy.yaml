apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memochat-default-deny
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memochat-allow-dns
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memochat-backend-to-internal-services
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: memochat
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 19092
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etcd
      ports:
        - protocol: TCP
          port: 2379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: memochat
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8090
        - protocol: UDP
          port: 8190
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50054
        - protocol: TCP
          port: 50055
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memochat-allow-backend-ingress
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: memochat
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8090
        - protocol: UDP
          port: 8190
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50054
        - protocol: TCP
          port: 50055
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memochat-allow-datastore-ingress
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - postgresql
          - redis
          - mongodb
          - kafka
          - rabbitmq
          - etcd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: memochat
      ports:
        - protocol: TCP
          port: 2379
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 19092
        - protocol: TCP
          port: 5672
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etcd
      ports:
        - protocol: TCP
          port: 2380
