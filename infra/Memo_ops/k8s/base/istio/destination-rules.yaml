# H-12: mTLS between all MemoChat microservices
#
# Per-service DestinationRules that instruct the Envoy sidecar to use
# ISTIO_MUTUAL TLS when initiating connections to each MemoChat service.
# ISTIO_MUTUAL reuses the certificate that Istio auto-provisions for the
# workload — no manual certificate management required.
#
# API: networking.istio.io/v1beta1 (Istio 1.20+)

# ── Gateway server (WebSocket / HTTP ingress point) ───────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: memochat-gateserver
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: service-mesh
    app.kubernetes.io/part-of: memochat
    app.kubernetes.io/managed-by: kustomize
spec:
  host: memochat-gateserver.memochat.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# ── Chat server (persistent chat sessions, StatefulSet) ───────────────────
