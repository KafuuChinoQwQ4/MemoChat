apiVersion: v1
kind: Secret
metadata:
  name: memochat-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Do not commit real production secrets here. Replace these placeholders
  # through overlays, ExternalSecret/SealedSecret/SOPS, or kubectl-created
  # Secret objects in the target cluster.
  # Database passwords
  postgres-password: "CHANGE_ME_POSTGRES_PASSWORD"
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
  mongodb-password: "CHANGE_ME_MONGODB_PASSWORD"

  # Kafka
  kafka-username: "CHANGE_ME_KAFKA_USERNAME"
  kafka-password: "CHANGE_ME_KAFKA_PASSWORD"

  # RabbitMQ
  rabbitmq-username: "CHANGE_ME_RABBITMQ_USERNAME"
  rabbitmq-password: "CHANGE_ME_RABBITMQ_PASSWORD"

  # Email (VarifyServer)
  email-username: "CHANGE_ME_EMAIL_USERNAME"
  email-password: "CHANGE_ME_EMAIL_AUTH_CODE"

  # JWT
  jwt-secret: "CHANGE_ME_JWT_SECRET"

  # Internal RPC
  rpc-shared-key: "CHANGE_ME_RPC_SHARED_KEY"
