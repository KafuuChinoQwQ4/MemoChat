# 4. MongoDB credentials
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memochat-mongodb-secret
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-aws-secrets
    kind: SecretStore
  target:
    name: memochat-mongodb-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Env var: MEMOCHAT_MONGO_URI  (full connection string including credentials)
    - secretKey: mongodb-uri
      remoteRef:
        key: memochat/mongodb
        property: uri
    # Env var: MEMOCHAT_MONGODB_USER  (used separately by the MongoDB operator)
    - secretKey: mongodb-username
      remoteRef:
        key: memochat/mongodb
        property: username
    # Env var: MEMOCHAT_MONGODB_PASSWORD
    - secretKey: mongodb-password
      remoteRef:
        key: memochat/mongodb
        property: password

# 5. Chat-auth HMAC secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memochat-hmac-secret
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-aws-secrets
    kind: SecretStore
  target:
    name: memochat-hmac-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Env var: MEMOCHAT_CHATAUTH_HMACSECRET
    # Must be >= 32 bytes of cryptographically-random data.
    # Service refuses to start if key is absent or too short (fail-closed).
    - secretKey: chat-auth-hmac-secret
      remoteRef:
        key: memochat/chat-auth
        property: hmac-secret

# 6. Refresh-token pepper
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memochat-refresh-pepper
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-aws-secrets
    kind: SecretStore
  target:
    name: memochat-refresh-pepper
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Env var: MEMOCHAT_AUTH_REFRESH_PEPPER
    # Must be >= 32 bytes of cryptographically-random data.
    # Service refuses to start if key is absent or too short (fail-closed).
    - secretKey: auth-refresh-pepper
      remoteRef:
        key: memochat/refresh-pepper
        property: pepper
