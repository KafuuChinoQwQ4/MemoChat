# P26: Vault/ExternalSecrets integration
#
# ExternalSecret objects for MemoChat — AWS Secrets Manager backend.
# API: external-secrets.io/v1beta1
#
# Secret layout in AWS Secrets Manager (one JSON object per path):
#
#   memochat/postgres          { "password": "…" }
#   memochat/redis             { "password": "…" }
#   memochat/rabbitmq          { "username": "…", "password": "…" }
#   memochat/mongodb           { "uri": "…", "username": "…", "password": "…" }
#   memochat/chat-auth         { "hmac-secret": "…" }
#   memochat/refresh-pepper    { "pepper": "…" }
#
# Each ExternalSecret creates/owns one Kubernetes Secret of type Opaque.
# Key names are intentionally kept compatible with base/secrets.yaml so
# existing Deployment volumeMounts / env.valueFrom references need no change.
#
# Runtime env-var mapping (from .env.example / IniConfig naming convention):
#   postgres-password     ← MEMOCHAT_POSTGRES_PASSWD
#   redis-password        ← MEMOCHAT_REDIS_PASSWD
#   rabbitmq-password     ← MEMOCHAT_RABBITMQ_PASSWORD
#   mongodb-uri           ← MEMOCHAT_MONGO_URI
#   chat-auth-hmac-secret ← MEMOCHAT_CHATAUTH_HMACSECRET
#   auth-refresh-pepper   ← MEMOCHAT_AUTH_REFRESH_PEPPER
# ──────────────────────────────────────────────────────────────────────────────

# 1. PostgreSQL password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memochat-postgres-secret
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: memochat-aws-secrets
    kind: SecretStore
  target:
    name: memochat-postgres-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Env var: MEMOCHAT_POSTGRES_PASSWD  (also MEMOCHAT_ACCOUNTPOSTGRES_PASSWD shares this secret)
    - secretKey: postgres-password
      remoteRef:
        key: memochat/postgres
        property: password

