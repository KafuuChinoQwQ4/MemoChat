# P26: Vault/ExternalSecrets integration
#
# Namespace-scoped SecretStore backed by AWS Secrets Manager.
# Scope: memochat namespace only (use ClusterSecretStore if multiple namespaces share the store).
#
# Prerequisites:
#   1. External Secrets Operator installed (see README.md).
#   2. An IAM role with secretsmanager:GetSecretValue / DescribeSecret on the
#      memochat/* path, bound to the external-secrets-sa ServiceAccount via IRSA
#      (EKS) or Workload Identity (GKE) or an explicit access-key Secret.
#
# Region override: patch .spec.provider.aws.region in the overlay kustomization,
# or use a KustomizeTransformer / env-based Kustomize var.  The placeholder
# value below ("REPLACE_AWS_REGION") is intentionally invalid so a misconfigured
# cluster fails loudly rather than silently.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: memochat-aws-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: external-secrets
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # Document the expected IAM role ARN as a non-functional annotation so
    # operators can locate it without reading the ServiceAccount manifest.
    external-secrets.io/iam-role-hint: "arn:aws:iam::<ACCOUNT_ID>:role/memochat-external-secrets"
spec:
  provider:
    aws:
      service: SecretsManager
      # Override this value per overlay (e.g. patch in overlays/prod/kustomization.yaml).
      # Accepted values: any valid AWS region string, e.g. "us-east-1", "eu-west-1".
      region: REPLACE_AWS_REGION
      auth:
        # IRSA / Pod Identity (recommended for EKS).
        # Annotate the ServiceAccount with the IAM role ARN:
        #   kubectl annotate sa external-secrets-sa \
        #     eks.amazonaws.com/role-arn=arn:aws:iam::<ACCOUNT_ID>:role/memochat-external-secrets \
        #     -n memochat
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: memochat
