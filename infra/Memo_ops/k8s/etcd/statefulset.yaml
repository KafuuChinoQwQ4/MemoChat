apiVersion: v1
kind: Service
metadata:
  name: memochat-etcd
  namespace: memochat
  labels:
    app.kubernetes.io/name: etcd
    app.kubernetes.io/component: etcd
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    app.kubernetes.io/name: etcd
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memochat-etcd
  namespace: memochat
  labels:
    app.kubernetes.io/name: etcd
    app.kubernetes.io/component: etcd
spec:
  serviceName: memochat-etcd
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etcd
        app.kubernetes.io/component: etcd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: etcd
          image: bitnami/etcd:3.5.9
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          env:
            - name: ALLOW_NONE_AUTHENTICATION
              value: "no"
            - name: ETCD_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memochat-etcd-secrets
                  key: root-password
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "https://$(HOSTNAME).memochat-etcd:2379"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "https://$(HOSTNAME).memochat-etcd:2380"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "memochat-etcd-cluster"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "https://0.0.0.0:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "https://0.0.0.0:2380"
            - name: ETCD_CERT_FILE
              value: /etc/etcd/tls/tls.crt
            - name: ETCD_KEY_FILE
              value: /etc/etcd/tls/tls.key
            - name: ETCD_TRUSTED_CA_FILE
              value: /etc/etcd/tls/ca.crt
            - name: ETCD_CLIENT_CERT_AUTH
              value: "true"
            - name: ETCD_PEER_CERT_FILE
              value: /etc/etcd/tls/tls.crt
            - name: ETCD_PEER_KEY_FILE
              value: /etc/etcd/tls/tls.key
            - name: ETCD_PEER_TRUSTED_CA_FILE
              value: /etc/etcd/tls/ca.crt
            - name: ETCD_PEER_CLIENT_CERT_AUTH
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /bitnami/etcd
            - name: etcd-tls
              mountPath: /etc/etcd/tls
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /opt/bitnami/scripts/etcd/healthcheck.sh
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /opt/bitnami/scripts/etcd/healthcheck.sh
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: etcd-tls
          secret:
            secretName: memochat-etcd-tls
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
