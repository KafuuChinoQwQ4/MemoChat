apiVersion: v1
kind: Service
metadata:
  name: memochat-postgres
  namespace: memochat
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memochat-postgres
  namespace: memochat
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memochat-postgres
  namespace: memochat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: memo_pg
            - name: POSTGRES_USER
              value: memochat_app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memochat-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memochat-postgres
