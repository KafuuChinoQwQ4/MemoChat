[GateServer]
host=127.0.0.1
# 与 Memo_ops/runtime/services/GateServerHttp2 中 GateServerHttp1.1 监听端口一致（单 Gate 时常为 8081）
port=8081
# 若 port 设为 8443 走 HTTPS，HTTPS 失败时的明文回退端口（勿与上面重复时可省略，默认 8080）
http_port=8081

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
ChunkRetry=3

[Call]
LiveKitUrl=ws://127.0.0.1:7880
CallBaseUrl=https://127.0.0.1:8443
LiveKitWsUrl=ws://127.0.0.1:7880
LiveKitUiUrl=qrc:/web/livekit/index.html
UseEmbeddedWebView=true

[Log]
Level=info
Dir=./logs
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=
ServiceNamespace=memochat
