[GateServer]
host=127.0.0.1
port=8080

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
ChunkRetry=3

[Log]
Level=info
Dir=./logs
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=
ServiceNamespace=memochat
