name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run clang-format
        run: |
          find apps/server/core -name "*.cpp" -o -name "*.h" | head -20 | xargs -I {} clang-format --style=file -i {}

  build-cpp:
    name: Build C++ Services
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.28"

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-binaries
          path: |
            build/bin/Release/GateServer.exe
            build/bin/Release/StatusServer.exe
            build/bin/Release/ChatServer.exe

  ai-agent-regression:
    name: AI Agent Offline Regression
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/server/core/AIOrchestrator/requirements-ci.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/server/core/AIOrchestrator/requirements-ci.txt

      - name: Run AIOrchestrator offline tests
        working-directory: apps/server/core/AIOrchestrator
        run: |
          python -m unittest tests.test_ollama_recovery tests.test_harness_structure

      - name: Validate AI smoke script syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content tools/scripts/ai_agent_smoke.ps1 -Raw))

      - name: Validate AI observability config
        shell: pwsh
        run: |
          python -c "import json, yaml; json.load(open('infra/deploy/local/observability/grafana/dashboards/ai-agent-overview.json', encoding='utf-8')); [yaml.safe_load(open(path, encoding='utf-8')) for path in ['infra/deploy/local/observability/alertmanager/alertmanager.yml', 'infra/deploy/local/observability/loki/config.yaml', 'infra/deploy/local/observability/prometheus/prometheus.yml', 'infra/deploy/local/observability/prometheus/rules/ai_orchestrator.yml']]"

  build-varifyserver:
    name: Build VarifyServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/server/core/VarifyServer/package-lock.json

      - name: Install dependencies
        working-directory: apps/server/core/VarifyServer
        run: npm ci

      - name: Run tests
        working-directory: apps/server/core/VarifyServer
        run: npm test || true

      - name: Build
        working-directory: apps/server/core/VarifyServer
        run: npm run build

  docker-build:
    name: Build Docker Images
    needs: [build-cpp, build-varifyserver]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download C++ artifacts
        uses: actions/download-artifact@v4
        with:
          name: cpp-binaries
          path: infra/Memo_ops/runtime/services/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GateServer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:dev-latest
          build-args: |
            SERVICE=GateServer

      - name: Build and push StatusServer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/statusserver:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/statusserver:dev-latest
          build-args: |
            SERVICE=StatusServer

      - name: Build and push ChatServer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:dev-latest
          build-args: |
            SERVICE=ChatServer

      - name: Build and push VarifyServer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/deploy/images/services/varifyserver.Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:dev-latest
