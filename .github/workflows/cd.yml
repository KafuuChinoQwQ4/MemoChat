name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, develop, feature/*]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/memochat

jobs:
  # ============================================================
  # 开发环境部署 (develop 分支)
  # ============================================================
  deploy-dev:
    name: Deploy to Dev
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.memochat.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: docker-images/

      - name: Load Docker images
        run: |
          docker load --input docker-images/gateserver.tar
          docker load --input docker-images/chatserver.tar
          docker load --input docker-images/varifyserver.tar

      - name: Tag images
        run: |
          docker tag memochat/gateserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:dev-latest
          docker tag memochat/chatserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:dev-latest
          docker tag memochat/varifyserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:dev-latest

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:dev-latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:dev-latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:dev-latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl for Dev
        run: |
          echo "${{ secrets.DEV_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Deploy to Dev
        run: |
          kubectl apply -k infra/Memo_ops/k8s/overlays/dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/memochat-gateserver -n memochat-dev --timeout=300s
          kubectl rollout status deployment/memochat-chatserver -n memochat-dev --timeout=300s
          kubectl rollout status deployment/memochat-varifyserver -n memochat-dev --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n memochat-dev
          kubectl get svc -n memochat-dev

  # ============================================================
  # 生产环境部署 (main 分支)
  # ============================================================
  deploy-prod:
    name: Deploy to Production
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://memochat.example.com
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: docker-images/

      - name: Load Docker images
        run: |
          docker load --input docker-images/gateserver.tar
          docker load --input docker-images/chatserver.tar
          docker load --input docker-images/varifyserver.tar

      - name: Tag images with version
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          docker tag memochat/gateserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:$VERSION
          docker tag memochat/chatserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:$VERSION
          docker tag memochat/varifyserver:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:$VERSION

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver:$VERSION
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver:$VERSION
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver:$VERSION

      - name: Resolve immutable image digests
        id: image-digests
        run: |
          set -euo pipefail
          GATESERVER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateserver"
          CHATSERVER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/chatserver"
          VARIFYSERVER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/varifyserver"
          {
            echo "gateserver_image=$GATESERVER_IMAGE"
            echo "chatserver_image=$CHATSERVER_IMAGE"
            echo "varifyserver_image=$VARIFYSERVER_IMAGE"
            echo "gateserver_digest=$(docker buildx imagetools inspect "$GATESERVER_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
            echo "chatserver_digest=$(docker buildx imagetools inspect "$CHATSERVER_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
            echo "varifyserver_digest=$(docker buildx imagetools inspect "$VARIFYSERVER_IMAGE:$VERSION" --format '{{.Manifest.Digest}}')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl for Production
        run: |
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Materialize production image digests
        env:
          GATESERVER_IMAGE: ${{ steps.image-digests.outputs.gateserver_image }}
          GATESERVER_DIGEST: ${{ steps.image-digests.outputs.gateserver_digest }}
          CHATSERVER_IMAGE: ${{ steps.image-digests.outputs.chatserver_image }}
          CHATSERVER_DIGEST: ${{ steps.image-digests.outputs.chatserver_digest }}
          VARIFYSERVER_IMAGE: ${{ steps.image-digests.outputs.varifyserver_image }}
          VARIFYSERVER_DIGEST: ${{ steps.image-digests.outputs.varifyserver_digest }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          overlay = Path("infra/Memo_ops/k8s/overlays/prod/kustomization.yaml")
          text = overlay.read_text(encoding="utf-8")
          replacements = {
              "  - name: memochat/gateserver\n    newTag: prod-digest-required":
                  f"  - name: memochat/gateserver\n    newName: {os.environ['GATESERVER_IMAGE']}\n    digest: {os.environ['GATESERVER_DIGEST']}",
              "  - name: memochat/chatserver\n    newTag: prod-digest-required":
                  f"  - name: memochat/chatserver\n    newName: {os.environ['CHATSERVER_IMAGE']}\n    digest: {os.environ['CHATSERVER_DIGEST']}",
              "  - name: memochat/varifyserver\n    newTag: prod-digest-required":
                  f"  - name: memochat/varifyserver\n    newName: {os.environ['VARIFYSERVER_IMAGE']}\n    digest: {os.environ['VARIFYSERVER_DIGEST']}",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing production image placeholder: {old.splitlines()[0]}")
              text = text.replace(old, new)
          overlay.write_text(text, encoding="utf-8")
          PY

      - name: Deploy to Production
        run: |
          kubectl apply -k infra/Memo_ops/k8s/overlays/prod

      - name: Wait for rollout (RollingUpdate)
        run: |
          echo "Waiting for GateServer rollout..."
          kubectl rollout status deployment/memochat-gateserver -n memochat --timeout=600s
          echo "Waiting for ChatServer rollout..."
          kubectl rollout status statefulset/memochat-chatserver -n memochat --timeout=600s
          echo "Waiting for VarifyServer rollout..."
          kubectl rollout status deployment/memochat-varifyserver -n memochat --timeout=600s

      - name: Verify deployment
        run: |
          kubectl get pods -n memochat
          kubectl get svc -n memochat

      - name: Create deployment annotation
        run: |
          kubectl annotate deployment/memochat-gateserver -n memochat \
            kubernetes.io/change-cause="Deployed at $VERSION from ${{ github.sha }}"
          kubectl annotate statefulset/memochat-chatserver -n memochat \
            kubernetes.io/change-cause="Deployed at $VERSION from ${{ github.sha }}"
