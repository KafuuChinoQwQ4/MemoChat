[GateServer]
Port=8080
WorkerThreads=

[Snowflake]
DatacenterId=0
WorkerId=1

[VarifyServer]
Host=127.0.0.1
Port=50051

[StatusServer]
Host=127.0.0.1
Port=50052

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2,chatserver3,chatserver4

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
QuicHost=127.0.0.1
QuicPort=8191
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[chatserver3]
Name=chatserver3
TcpHost=127.0.0.1
TcpPort=8092
QuicHost=127.0.0.1
QuicPort=8192
RpcHost=127.0.0.1
RpcPort=50057
Enabled=true

[chatserver4]
Name=chatserver4
TcpHost=127.0.0.1
TcpPort=8093
QuicHost=127.0.0.1
QuicPort=8193
RpcHost=127.0.0.1
RpcPort=50058
Enabled=true

[Postgres]
Host=127.0.0.1
Port=5432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456
PoolSize=30

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[LoginCache]
TtlSec=3600

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
SessionExpireSec=86400
StorageProvider=s3

[MinIO]
Enabled=true
Endpoint=127.0.0.1:9000
Region=us-east-1
BucketAvatar=memochat-avatar
BucketFile=memochat-file
BucketImage=memochat-image
BucketVideo=memochat-video
PublicUrl=http://127.0.0.1:9000

[Call]
Enabled=true
BaseUrl=http://127.0.0.1:8080
LiveKitUrl=ws://127.0.0.1:7880
ApiKey=devkey
ApiSecret=secret
RoomPrefix=memochat
RingTimeoutSec=45
BusyKeyTtlSec=50
TokenTtlSec=3600

[Mongo]
Enabled=true
Uri=mongodb://memochat_app:123456@127.0.0.1:27017/memochat
Database=memochat
MomentsCollection=moments_content

[Log]
Level=info
Dir=../../artifacts/logs/services/GateServer
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=GateServer
ServiceNamespace=memochat

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-gate
ConsumerGroup=memochat-gate-sideeffects

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=guest
Password=guest
VHost=/
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
