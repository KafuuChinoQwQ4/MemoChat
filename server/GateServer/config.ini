[GateServer]
Port=8080

[VarifyServer]
Host=127.0.0.1
Port=50051

[StatusServer]
Host=127.0.0.1
Port=50052

[Mysql]
Host=tcp://127.0.0.1
Port=3306
User=root
Passwd=123456
Schema=memo

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
SessionExpireSec=86400
StorageProvider=local

[Call]
Enabled=true
BaseUrl=http://127.0.0.1:8080
LiveKitUrl=ws://127.0.0.1:7880
ApiKey=devkey
ApiSecret=secret
RoomPrefix=memochat
RingTimeoutSec=45
BusyKeyTtlSec=50
TokenTtlSec=3600

[Log]
Level=info
Dir=./logs
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=GateServer
ServiceNamespace=memochat
