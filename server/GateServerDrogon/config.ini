[GateServer]
Port=8081

[VarifyServer]
Host=127.0.0.1
Port=50051

[StatusServer]
Host=127.0.0.1
Port=50052

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2,chatserver3,chatserver4

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
QuicHost=127.0.0.1
QuicPort=8191
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[chatserver3]
Name=chatserver3
TcpHost=127.0.0.1
TcpPort=8092
QuicHost=127.0.0.1
QuicPort=8192
RpcHost=127.0.0.1
RpcPort=50057
Enabled=true

[chatserver4]
Name=chatserver4
TcpHost=127.0.0.1
TcpPort=8093
QuicHost=127.0.0.1
QuicPort=8193
RpcHost=127.0.0.1
RpcPort=50058
Enabled=true

[Postgres]
Host=memochat-postgres
Port=5432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable

[Redis]
Host=memochat-redis
Port=6379
Passwd=123456

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[LoginCache]
TtlSec=3600

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
SessionExpireSec=86400
StorageProvider=local

[Call]
Enabled=true
BaseUrl=http://127.0.0.1:8080
LiveKitUrl=ws://127.0.0.1:7880
ApiKey=devkey
ApiSecret=secret
RoomPrefix=memochat
RingTimeoutSec=45
BusyKeyTtlSec=50
TokenTtlSec=3600

[Log]
Level=info
Dir=../../artifacts/logs/services/GateServerDrogon
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://memochat-otel-collector:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=GateServerDrogon
ServiceNamespace=memochat

[Kafka]
Brokers=memochat-redpanda:19092
ClientId=memochat-gatedrogon
ConsumerGroup=memochat-gatedrogon-sideeffects

[RabbitMQ]
Host=memochat-rabbitmq
Port=5672
Username=guest
Password=guest
VHost=/
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
