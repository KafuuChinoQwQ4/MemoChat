[GateServer]
Port=8080

[VarifyServer]
Host=127.0.0.1
Port=50051

[StatusServer]
Host=127.0.0.1
Port=50052

[SelfServer]
Name=chatserver1
Host=0.0.0.0
Port=8090
RPCPort=50055

[Mysql]
Host=tcp://127.0.0.1
Port=3306
User=root
Passwd=123456
Schema=memo

[Redis]
Host=127.0.0.1
Port=6379
