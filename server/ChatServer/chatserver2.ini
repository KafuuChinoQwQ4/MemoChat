[GateServer]
Port=8080

[VarifyServer]
Host=127.0.0.1
Port=50051

[StatusServer]
Host=127.0.0.1
Port=50052

[SelfServer]
Name=chatserver2

[Runtime]
Role=ingress

[FeatureFlags]
chat_private_kafka_shadow=false
chat_private_kafka_primary=false
chat_group_kafka_shadow=false
chat_group_kafka_primary=false
history_index_mongo_read=false

[Postgres]
Host=127.0.0.1
Port=5432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[RelationBootstrapCache]
TtlSec=15

[Mongo]
Enabled=true
Uri=mongodb://memochat_app:123456@127.0.0.1:27017/memochat
Database=memochat
PrivateCollection=private_messages
GroupCollection=group_messages

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2,chatserver3,chatserver4

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[chatserver3]
Name=chatserver3
TcpHost=127.0.0.1
TcpPort=8092
RpcHost=127.0.0.1
RpcPort=50057
Enabled=true

[chatserver4]
Name=chatserver4
TcpHost=127.0.0.1
TcpPort=8093
RpcHost=127.0.0.1
RpcPort=50058
Enabled=true

[Log]
Level=info
Dir=../../artifacts/logs/services/chatserver2
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=ChatServer
ServiceNamespace=memochat
