[StatusServer]
Host=0.0.0.0
Port=50052

[Postgres]
Host=127.0.0.1
Port=5432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2,chatserver3,chatserver4

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
QuicHost=127.0.0.1
QuicPort=8191
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[chatserver3]
Name=chatserver3
TcpHost=127.0.0.1
TcpPort=8092
QuicHost=127.0.0.1
QuicPort=8192
RpcHost=127.0.0.1
RpcPort=50057
Enabled=true

[chatserver4]
Name=chatserver4
TcpHost=127.0.0.1
TcpPort=8093
QuicHost=127.0.0.1
QuicPort=8193
RpcHost=127.0.0.1
RpcPort=50058
Enabled=true

[Log]
Level=info
Dir=../../artifacts/logs/services/StatusServer
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=StatusServer
ServiceNamespace=memochat

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-status
ConsumerGroup=memochat-status-audit

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=guest
Password=guest
VHost=/
PrefetchCount=10
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
RetryDelayMs=5000
MaxRetries=5
