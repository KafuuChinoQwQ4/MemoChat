[StatusServer]
Host=0.0.0.0
Port=50052

[Mysql]
Host=tcp://127.0.0.1
Port=3306
User=root
Passwd=123456
Schema=memo

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[Log]
Level=info
Dir=./logs
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=StatusServer
ServiceNamespace=memochat
