server:
  host: 0.0.0.0
  port: 8096

llm:
  default_backend: ollama
  default_model: qwen2.5:7b
  timeout_per_step_sec: 30
  timeout_total_sec: 300
  fallback_on_error: true

ollama:
  base_url: http://127.0.0.1:11434
  enabled: true

openai:
  api_key: ${OPENAI_API_KEY:}
  base_url: https://api.openai.com/v1
  enabled: false

anthropic:
  api_key: ${ANTHROPIC_API_KEY:}
  base_url: https://api.anthropic.com/v1
  enabled: false

kimi:
  api_key: ${KIMI_API_KEY:}
  base_url: https://api.moonshot.cn/v1
  enabled: false

qdrant:
  host: 127.0.0.1
  port: 6333
  grpc_port: 6334
  collection_name: memochat_kb
  enabled: true

neo4j:
  uri: bolt://127.0.0.1:7687
  username: neo4j
  password: ${NEO4J_PASSWORD:password}
  database: neo4j
  enabled: false

embeddings:
  provider: sentence-transformers
  model: all-MiniLM-L6-v2

agent:
  max_iterations: 15
  hitl_enabled: true
  system_prompt: |
    你是一个 MemoChat AI 助手，可以帮助用户回答问题、进行智能对话、提供建议。
    当你需要执行高风险操作（如发送消息、执行金融操作）时，必须请求用户确认。
    使用搜索工具获取最新信息，使用知识库检索增强你的回答。

memory:
  short_term_max: 20
  episodic_enabled: true
  semantic_enabled: true

observability:
  langfuse_public_key: ${LANGFUSE_PUBLIC_KEY:}
  langfuse_secret_key: ${LANGFUSE_SECRET_KEY:}
  langfuse_host: ${LANGFUSE_HOST:http://127.0.0.1:3000}
  enabled: false
  otel_endpoint: http://127.0.0.1:4317
