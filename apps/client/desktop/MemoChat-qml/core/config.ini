[GateServer]
host=127.0.0.1
# 默认经由本地 Docker Envoy 入口转发到 GateServer（8080/8084）
port=80
# 若 port 设为 8443 走 HTTPS，HTTPS 失败时的明文回退端口
http_port=80
# 本地协议回退顺序：HTTP/3 -> HTTP/2 -> HTTP/1.1。
# Qt Network 目前不直接承载 HTTP/3；HTTP/3 服务通过 smoke 工具验证，
# 客户端会经由 Envoy 8443 优先尝试 HTTP/2，再回退到 HTTP/1.1。
http2_port=8443
http3_port=8443
preferred_http_protocol=http3

[AI]
# AI 客户端请求直连本地 AIGateway，避免 Envoy HTTPS 自签证书和 HTTP->HTTPS 重定向影响 QML 运行态。
BaseUrl=http://127.0.0.1:8093

[Media]
BaseUrl=http://127.0.0.1:8094
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
ChunkRetry=3

[Call]
LiveKitUrl=ws://127.0.0.1:7880
CallBaseUrl=https://127.0.0.1:8443
LiveKitWsUrl=ws://127.0.0.1:7880
LiveKitUiUrl=qrc:/web/livekit/index.html
UseEmbeddedWebView=true

[Log]
Level=info
Dir=./logs
Format=json
ToConsole=true
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=
ServiceNamespace=memochat
