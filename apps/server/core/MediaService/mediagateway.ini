[MediaGateway]
Port=8094
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=4

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_media_app
Passwd=
Database=memo_media
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=
PoolSize=30

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
SessionExpireSec=86400
StorageProvider=s3

[MinIO]
Enabled=true
Endpoint=127.0.0.1:9000
Scheme=http
VerifySSL=false
Region=us-east-1
; Production credentials must be injected through MEMOCHAT_MINIO_ACCESSKEY /
; MEMOCHAT_MINIO_SECRETKEY or MINIO_ACCESS_KEY / MINIO_SECRET_KEY.
AccessKey=
SecretKey=
BucketAvatar=memochat-avatar
BucketFile=memochat-file
BucketImage=memochat-image
BucketVideo=memochat-video
BucketMoments=memochat-moments
PublicUrl=http://127.0.0.1:9000

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override (see docs/secret-management.md).
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[AuthToken]
; DEV ONLY. In production set env MEMOCHAT_AUTHTOKEN_JWTSECRET to override (see docs/secret-management.md).
JwtSecret=memochat-dev-access-token-secret
JwtIssuer=memochat
JwtAudience=memochat-http
AccessTokenTtlSec=900

[Log]
Level=warn
Dir=../../artifacts/logs/services/MediaGatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=MediaGatewayService1
ServiceNamespace=memochat
