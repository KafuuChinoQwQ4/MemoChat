[AIGateway]
Port=8093
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=3

[Redis]
Host=127.0.0.1
Port=6379
Passwd=
PoolSize=30

[AIServer]
Host=127.0.0.1
Port=8095

[AIOrchestrator]
Host=127.0.0.1
Port=8096
TimeoutSec=300
InternalAuthHeader=X-MemoChat-AI-Internal-Key
InternalApiKeyEnv=MEMOCHAT_AI_INTERNAL_API_KEY

[AIProviderAdmin]
AuthHeader=X-MemoChat-AI-Provider-Admin-Key
AdminKeyEnv=MEMOCHAT_AI_PROVIDER_ADMIN_KEY
AdminKey=

[Log]
Level=warn
Dir=../../artifacts/logs/services/AIGatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=AIGatewayService1
ServiceNamespace=memochat
