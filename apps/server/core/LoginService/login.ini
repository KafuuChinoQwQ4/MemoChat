[Login]
Port=8102
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=11

[Cluster]
DiscoveryMode=static
Nodes=chatserver1

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
WsEnabled=true
WsHost=127.0.0.1
WsPort=8444
WsPath=/ws
WtEnabled=true
WtHost=127.0.0.1
WtPort=8445
WtPath=/chat
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=
PoolSize=30

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override (see docs/secret-management.md).
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[LoginCache]
TtlSec=3600

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-login1
ConsumerGroup=memochat-login1-sideeffects

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=
VHost=/
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
PrefetchCount=10

[Log]
Level=warn
Dir=../../artifacts/logs/services/LoginService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=LoginService1
ServiceNamespace=memochat
