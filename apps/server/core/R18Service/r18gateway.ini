[R18Gateway]
Port=8098
WorkerThreads=12

[R18SourceAdmin]
AuthHeader=X-MemoChat-R18-Source-Admin-Key
; Fail closed when empty. Set env MEMOCHAT_R18SOURCEADMIN_ADMINKEY for operators.
AdminKey=

[R18Picacg]
; Comma-separated exact Picacg media hosts. Empty disables remote image proxying.
AllowedImageHosts=storage-b.picacomic.com,img.picacomic.com

[Snowflake]
DatacenterId=0
WorkerId=7

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=
PoolSize=30

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override (see docs/secret-management.md).
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[AuthToken]
; DEV ONLY. In production set env MEMOCHAT_AUTHTOKEN_JWTSECRET to override (see docs/secret-management.md).
JwtSecret=memochat-dev-access-token-secret
JwtIssuer=memochat
JwtAudience=memochat-http
AccessTokenTtlSec=900

[Log]
Level=warn
Dir=../../artifacts/logs/services/R18GatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=R18GatewayService1
ServiceNamespace=memochat
