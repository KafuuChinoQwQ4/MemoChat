[Register]
Port=8101
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=10

[VarifyServer]
Host=127.0.0.1
Port=50051

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=123456
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456
PoolSize=30

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override (see docs/secret-management.md).
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[LoginCache]
TtlSec=3600

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-register1
ConsumerGroup=memochat-register1-sideeffects

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=123456
VHost=/
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
PrefetchCount=10

[Log]
Level=warn
Dir=../../artifacts/logs/services/RegisterService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=RegisterService1
ServiceNamespace=memochat
