[MomentsGateway]
Port=8099
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=5

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_moments_app
Passwd=123456
Database=memo_moments
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456
PoolSize=30

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[Mongo]
Enabled=true
Uri=mongodb://memochat_app:123456@localhost:27017/memochat
Database=memochat
MomentsCollection=moments_content

[Log]
Level=warn
Dir=../../artifacts/logs/services/MomentsGatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=MomentsGatewayService1
ServiceNamespace=memochat
