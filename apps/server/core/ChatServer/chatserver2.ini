[GateServer]
Port=8080

[VarifyServer]
Host=127.0.0.1
Port=50051

[SelfServer]
Name=chatserver2

[Snowflake]
DatacenterId=1
WorkerId=2

[Runtime]
Role=hybrid
AsyncEventBus=kafka
TaskBus=rabbitmq

[RelationService]
Backend=grpc

Endpoint=127.0.0.1:50091
[RelationQueryService]
Backend=grpc

Endpoint=127.0.0.1:50090
[MessageService]
Backend=grpc

Endpoint=127.0.0.1:50092
[FeatureFlags]
chat_private_kafka_shadow=false
chat_private_kafka_primary=false
chat_group_kafka_shadow=false
chat_group_kafka_primary=false
history_index_mongo_read=false
chat_login_offline_push=true
chat_login_verbose_logs=false
chat_login_duplicate_session_check=false

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[AccountPostgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=8

[Redis]
Host=127.0.0.1
Port=6379
Passwd=

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override.
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[Quic]
Alpn=memochat-chat
PfxFile=server.pfx
PfxPassword=
CertFile=server.crt
PrivateKeyFile=server.key

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-chatserver2
ConsumerGroup=memochat-chat-workers
TopicPrivate=chat.private.v1
TopicGroup=chat.group.v1
TopicPrivateDlq=chat.private.dlq.v1
TopicGroupDlq=chat.group.dlq.v1
EnableIdempotence=true
BatchNumMessages=1000
QueueBufferingMaxMs=10
SessionTimeoutMs=10000
OutboxBatchSize=100
OutboxRetryBaseMs=1000
OutboxRetryMaxMs=30000
ConsumeRetryMax=5

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=
VHost=/
PrefetchCount=50
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
RetryDelayMs=5000
MaxRetries=5

[RelationBootstrapCache]
TtlSec=15

[LogicSystem]
WorkerCount=8
HeartbeatRouteRefreshSec=15
LoginOfflinePushDelayMs=0

[Mongo]
Enabled=true
Uri=
Database=memochat
PrivateCollection=private_messages
GroupCollection=group_messages

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
WsEnabled=true
WsHost=127.0.0.1
WsPort=8444
WsPath=/ws
WtEnabled=true
WtHost=127.0.0.1
WtPort=8445
WtPath=/chat
WtCertFile=server.crt
WtKeyFile=server.key
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
QuicHost=127.0.0.1
QuicPort=8191
WsEnabled=true
WsHost=127.0.0.1
WsPort=8446
WsPath=/ws
WtEnabled=true
WtHost=127.0.0.1
WtPort=8447
WtPath=/chat
WtCertFile=server.crt
WtKeyFile=server.key
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[Log]
Level=warn
Dir=../../artifacts/logs/services/chatserver2
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=ChatServer
ServiceNamespace=memochat
