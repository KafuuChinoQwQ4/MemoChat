[SelfServer]
Name=chatmessageservice1

[Snowflake]
DatacenterId=1
WorkerId=10

[Runtime]
Role=worker
AsyncEventBus=kafka
TaskBus=rabbitmq

[MessageServiceRpc]
Host=127.0.0.1
Port=50092

[MessageService]
Backend=inprocess

[RelationService]
Backend=inprocess

[RelationQueryService]
Backend=inprocess

[FeatureFlags]
chat_private_kafka_shadow=false
chat_private_kafka_primary=false
chat_group_kafka_shadow=false
chat_group_kafka_primary=false
history_index_mongo_read=false
chat_login_offline_push=true
chat_login_verbose_logs=false
chat_login_duplicate_session_check=false

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[AccountPostgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=123456
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=8

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=123456
VHost=/
PrefetchCount=50
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
RetryDelayMs=5000
MaxRetries=5

[Mongo]
Enabled=true
Uri=mongodb://memochat_app:123456@localhost:27017/memochat
Database=memochat
PrivateCollection=private_messages
GroupCollection=group_messages

[Cluster]
DiscoveryMode=static
Nodes=chatserver1

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[Log]
Level=warn
Dir=../../artifacts/logs/services/chatmessageservice1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=ChatMessageService
ServiceNamespace=memochat
