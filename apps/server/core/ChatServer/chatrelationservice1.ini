[SelfServer]
Name=chatrelationservice1

[Snowflake]
DatacenterId=1
WorkerId=9

[Runtime]
Role=worker
AsyncEventBus=kafka
TaskBus=rabbitmq

[RelationServiceRpc]
Host=127.0.0.1
Port=50091

[RelationService]
Backend=inprocess

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[AccountPostgres]
Host=127.0.0.1
Port=15432
User=memo_account_app
Passwd=
Database=memo_account
Schema=memo
SslMode=disable
PoolSize=8

[Redis]
Host=127.0.0.1
Port=6379
Passwd=

[RelationBootstrapCache]
TtlSec=15

; Required by the relation worker's producer-side task/event publishers: the
; friend accept/add handlers push a live "relation_notify" delivery task (clears
; the requester's 认证中) and a relation-state event. Without these sections the
; RabbitMQ/Kafka buses are invalid and the peer push is silently dropped.
[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=
VHost=/
PrefetchCount=50
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
RetryDelayMs=5000
MaxRetries=5

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-chatrelationservice1
ConsumerGroup=memochat-chat-workers
TopicPrivate=chat.private.v1
TopicGroup=chat.group.v1
TopicPrivateDlq=chat.private.dlq.v1
TopicGroupDlq=chat.group.dlq.v1
EnableIdempotence=true
BatchNumMessages=1000

[Log]
Level=warn
Dir=../../artifacts/logs/services/chatrelationservice1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=ChatRelationServiceWorker
ServiceNamespace=memochat
