[SelfServer]
Name=chatrelationservice1

[Snowflake]
DatacenterId=1
WorkerId=9

[Runtime]
Role=worker
AsyncEventBus=kafka
TaskBus=rabbitmq

[RelationServiceRpc]
Host=127.0.0.1
Port=50091

[RelationService]
Backend=inprocess

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[RelationBootstrapCache]
TtlSec=15

[Log]
Level=warn
Dir=../../artifacts/logs/services/chatrelationservice1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=ChatRelationServiceWorker
ServiceNamespace=memochat
