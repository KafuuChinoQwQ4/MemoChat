name: memochat

# MemoChat AI Agent 服务依赖：Neo4j 图数据库 + Qdrant 向量数据库
# 启动命令：docker compose up -d
# 停止命令：docker compose down
# 查看日志：docker compose logs -f neo4j
#           docker compose logs -f qdrant

services:
  #######################
  # AI Harness App
  #######################
  memochat-ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memochat-ai-orchestrator
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - MEMOCHAT_AI_LLM__OLLAMA__BASE_URL=http://memochat-ollama:11434
      - MEMOCHAT_AI_RAG__QDRANT__HOST=memochat-qdrant
      - MEMOCHAT_AI_NEO4J__HOST=memochat-neo4j
      - MEMOCHAT_AI_POSTGRES__HOST=host.docker.internal
      - MEMOCHAT_AI_POSTGRES__PORT=15432
      - MEMOCHAT_AI_POSTGRES__USER=memochat
      - MEMOCHAT_AI_POSTGRES__PASSWORD=123456
      - MEMOCHAT_AI_POSTGRES__DATABASE=memo_pg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.cache/huggingface:/app/.cache/huggingface
      - ./.cache/sentence_transformers:/app/.cache/sentence_transformers
    depends_on:
      - memochat-ollama
      - memochat-neo4j
      - memochat-qdrant

  #######################
  # Local LLM API
  # local_api: Ollama
  #######################
  memochat-ollama:
    image: ollama/ollama:latest
    container_name: memochat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./.data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  #######################
  # Neo4j 图数据库
  #######################
  memochat-neo4j:
    image: neo4j:5.23.0-community
    container_name: memochat-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP — Neo4j Browser 管理界面
      - "7687:7687"   # Bolt — 应用连接端口
    environment:
      # 认证 (用户名/密码)
      - NEO4J_AUTH=neo4j/password
      # 内存配置
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=1g
      # APOC 插件（用于图算法）
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      # 事务超时
      - NEO4J_dbms_transaction_timeout=30s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./graph/init.cypher:/init.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  #######################
  # Qdrant 向量数据库
  #######################
  memochat-qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memochat-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API（高性能向量检索）
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=32
      # 可选：启用 verbose 日志
      # - QDRANT__LOG_LEVEL=DEBUG
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /proc/net/tcp | grep :18BD' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #######################
  # 可选：Langfuse 追踪平台（LLM 可观测性）
  #######################
  memochat-langfuse:
    image: langfuse/langfuse:latest
    container_name: memochat-langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"   # Web UI
      - "3030:3030"   # API
    environment:
      - DATABASE_URL=postgresql://memochat:123456@host.docker.internal:15432/langfuse
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=your-salt-change-in-production
    depends_on: []   # Langfuse 需要 PostgreSQL，请确保 docker-compose.local.yml 已启动
    profiles:
      - observability  # 仅在 `docker compose --profile observability up -d` 时启动

volumes:
  neo4j_data:
    name: memochat-neo4j-data
  neo4j_logs:
    name: memochat-neo4j-logs
  qdrant_storage:
    name: memochat-qdrant-storage
