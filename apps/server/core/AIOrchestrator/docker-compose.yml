name: memochat-ai

# MemoChat AI Agent 服务依赖：Neo4j 图数据库 + Qdrant 向量数据库
# 启动命令：docker compose up -d
# 停止命令：docker compose down
# 查看日志：docker compose logs -f neo4j
#           docker compose logs -f qdrant

services:
  #######################
  # AI Harness App
  #######################
  memochat-ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memochat-ai-orchestrator
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - PYTHONUNBUFFERED=1
      - MEMOCHAT_AI_CONFIG_PATH=/app/runtime-config/config.yaml
      - HF_HOME=/app/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - MEMOCHAT_AI_LLM__OLLAMA__ENABLED=false
      - MEMOCHAT_AI_RAG__QDRANT__HOST=memochat-qdrant
      - MEMOCHAT_AI_NEO4J__HOST=memochat-neo4j
      - MEMOCHAT_AI_POSTGRES__HOST=host.docker.internal
      - MEMOCHAT_AI_POSTGRES__PORT=15432
      - MEMOCHAT_AI_POSTGRES__USER=memochat
      - MEMOCHAT_AI_POSTGRES__PASSWORD=123456
      - MEMOCHAT_AI_POSTGRES__DATABASE=memo_pg
      - MEMOCHAT_AI_AGENT_QUEUE__ENABLED=${MEMOCHAT_AI_AGENT_QUEUE__ENABLED:-true}
      - MEMOCHAT_AI_AGENT_QUEUE__WORKER_CONCURRENCY=${MEMOCHAT_AI_AGENT_QUEUE__WORKER_CONCURRENCY:-8}
      - MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__HOST=${MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__HOST:-host.docker.internal}
      - MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__PORT=5672
      - MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__USERNAME=${MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__USERNAME:-memochat}
      - MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__PASSWORD=${MEMOCHAT_AI_AGENT_QUEUE__RABBITMQ__PASSWORD:-123456}
      - MEMOCHAT_AI_AGENT_QUEUE__REDPANDA__BOOTSTRAP_SERVERS=${MEMOCHAT_AI_AGENT_QUEUE__REDPANDA__BOOTSTRAP_SERVERS:-host.docker.internal:19092}
      - MEMOCHAT_AI_AGENT_QUEUE__REDPANDA__PROXY_URL=${MEMOCHAT_AI_AGENT_QUEUE__REDPANDA__PROXY_URL:-http://host.docker.internal:18082}
      - MEMOCHAT_AI_SEMANTIC_CACHE__ENABLED=${MEMOCHAT_AI_SEMANTIC_CACHE__ENABLED:-true}
      - MEMOCHAT_AI_SEMANTIC_CACHE__REDIS__HOST=${MEMOCHAT_AI_SEMANTIC_CACHE__REDIS__HOST:-host.docker.internal}
      - MEMOCHAT_AI_SEMANTIC_CACHE__REDIS__PORT=6379
      - MEMOCHAT_AI_SEMANTIC_CACHE__REDIS__PASSWORD=${MEMOCHAT_AI_SEMANTIC_CACHE__REDIS__PASSWORD:-123456}
      - MEMOCHAT_AI_SEMANTIC_CACHE__SIMILARITY_THRESHOLD=${MEMOCHAT_AI_SEMANTIC_CACHE__SIMILARITY_THRESHOLD:-0.98}
      - MEMOCHAT_API_PROVIDERS_FILE=/app/.data/api_providers.json
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MEMOCHAT_AI_OBSERVABILITY__ENABLED=${MEMOCHAT_AI_OBSERVABILITY__ENABLED:-false}
      - MEMOCHAT_AI_OBSERVABILITY__BACKEND=${MEMOCHAT_AI_OBSERVABILITY__BACKEND:-langsmith}
      - MEMOCHAT_ENABLE_PET=${MEMOCHAT_ENABLE_PET:-true}
      - MEMOCHAT_PET_DETERMINISTIC=${MEMOCHAT_PET_DETERMINISTIC:-true}
      - MEMOCHAT_ENABLE_LIVE2D_NATIVE=${MEMOCHAT_ENABLE_LIVE2D_NATIVE:-false}
      - MEMOCHAT_LIVE2D_SDK_ROOT=${MEMOCHAT_LIVE2D_SDK_ROOT:-}
      - MEMOCHAT_PET_ASSET_ROOT=${MEMOCHAT_PET_ASSET_ROOT:-}
      - MEMOCHAT_PET_CLOUD_VISION=${MEMOCHAT_PET_CLOUD_VISION:-false}
      - MEMOCHAT_PET_VOICE_CLONE=${MEMOCHAT_PET_VOICE_CLONE:-false}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-memochat-ai-local}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${MEMOCHAT_AI_CONFIG_FILE:-/data/docker-data/memochat/ai-orchestrator/config.yaml}
        target: /app/runtime-config/config.yaml
        read_only: true
      - type: bind
        source: ${MEMOCHAT_AI_DATA_DIR:-/data/docker-data/memochat/ai-orchestrator/data}
        target: /app/.data
      - type: bind
        source: ${MEMOCHAT_AI_HUGGINGFACE_CACHE_DIR:-/data/docker-data/memochat/ai-orchestrator/huggingface}
        target: /app/.cache/huggingface
      - type: bind
        source: ${MEMOCHAT_AI_SENTENCE_TRANSFORMERS_CACHE_DIR:-/data/docker-data/memochat/ai-orchestrator/sentence_transformers}
        target: /app/.cache/sentence_transformers
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      memochat-neo4j:
        condition: service_healthy
      memochat-qdrant:
        condition: service_healthy

  #######################
  # Neo4j 图数据库
  #######################
  memochat-neo4j:
    image: neo4j:5.23.0-community
    container_name: memochat-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP — Neo4j Browser 管理界面
      - "7687:7687"   # Bolt — 应用连接端口
    environment:
      # 认证 (用户名/密码)
      - NEO4J_AUTH=neo4j/password
      # 内存配置
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=1g
      # APOC 插件（用于图算法）
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      # 事务超时
      - NEO4J_dbms_transaction_timeout=30s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./graph/init.cypher:/init.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  #######################
  # Qdrant 向量数据库
  #######################
  memochat-qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memochat-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API（高性能向量检索）
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=32
      # 可选：启用 verbose 日志
      # - QDRANT__LOG_LEVEL=DEBUG
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /proc/net/tcp | grep :18BD' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  neo4j_data:
    name: memochat-neo4j-data
    external: true
  neo4j_logs:
    name: memochat-neo4j-logs
    external: true
  qdrant_storage:
    name: memochat-qdrant-storage
    external: true
