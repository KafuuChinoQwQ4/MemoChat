[CallGateway]
Port=8097
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=6

[Postgres]
Host=127.0.0.1
Port=15432
User=memo_call_app
Passwd=
Database=memo_call
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=
PoolSize=30

[ChatAuth]
; DEV ONLY. In production set env MEMOCHAT_CHATAUTH_HMACSECRET to override (see docs/secret-management.md).
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[Cluster]
DiscoveryMode=static
Nodes=chatserver1

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[Call]
Enabled=true
BaseUrl=http://127.0.0.1:8097
LiveKitUrl=ws://127.0.0.1:7880
; Production credentials must be injected through MEMOCHAT_CALL_APIKEY /
; MEMOCHAT_CALL_APISECRET. Local compose still provides dev defaults.
ApiKey=
ApiSecret=
RoomPrefix=memochat
RingTimeoutSec=45
BusyKeyTtlSec=50
TokenTtlSec=3600

[Log]
Level=warn
Dir=../../artifacts/logs/services/CallGatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=CallGatewayService1
ServiceNamespace=memochat
