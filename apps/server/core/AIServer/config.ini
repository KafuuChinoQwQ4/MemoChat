[AIServer]
Host=0.0.0.0
Port=8095

[AIOrchestrator]
Host=127.0.0.1
Port=8096
TimeoutSec=300

[AI]
DefaultBackend=ollama
DefaultModel=qwen3:4b
MaxContextMessages=20
MaxTokens=2048

[Ollama]
Host=127.0.0.1
Port=11434
Enabled=true

[OpenAI]
ApiKey=
BaseUrl=https://api.openai.com/v1
Enabled=false

[Claude]
ApiKey=
BaseUrl=https://api.anthropic.com/v1
Enabled=false

[Kimi]
ApiKey=
BaseUrl=https://api.moonshot.cn/v1
Enabled=false

[Qdrant]
Host=127.0.0.1
Port=6333
GrpcPort=6334
Enabled=true

[Neo4j]
Host=127.0.0.1
Port=7687
Username=neo4j
Password=password
Database=neo4j
Enabled=false

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456

[Log]
Level=warn
Dir=../../artifacts/logs/services/AIServer
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=AIServer
ServiceNamespace=memochat
