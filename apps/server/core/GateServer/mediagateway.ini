[MediaGateway]
Port=8094
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=4

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456
PoolSize=30

[Media]
MaxImageMB=200
MaxFileMB=20480
ChunkSizeKB=4096
SessionExpireSec=86400
StorageProvider=s3

[MinIO]
Enabled=true
Endpoint=127.0.0.1:9000
Region=us-east-1
AccessKey=memochat_admin
SecretKey=MinioPass2026!
BucketAvatar=memochat-avatar
BucketFile=memochat-file
BucketImage=memochat-image
BucketVideo=memochat-video
BucketMoments=memochat-moments
PublicUrl=http://127.0.0.1:9000

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[Log]
Level=warn
Dir=../../artifacts/logs/services/MediaGatewayService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=MediaGatewayService1
ServiceNamespace=memochat
