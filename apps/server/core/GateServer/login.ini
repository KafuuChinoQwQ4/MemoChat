[Login]
Port=8102
WorkerThreads=12

[Snowflake]
DatacenterId=0
WorkerId=11

[Cluster]
DiscoveryMode=static
Nodes=chatserver1,chatserver2

[chatserver1]
Name=chatserver1
TcpHost=127.0.0.1
TcpPort=8090
QuicHost=127.0.0.1
QuicPort=8190
RpcHost=127.0.0.1
RpcPort=50055
Enabled=true

[chatserver2]
Name=chatserver2
TcpHost=127.0.0.1
TcpPort=8091
QuicHost=127.0.0.1
QuicPort=8191
RpcHost=127.0.0.1
RpcPort=50056
Enabled=true

[Postgres]
Host=127.0.0.1
Port=15432
User=memochat
Passwd=123456
Database=memo_pg
Schema=memo
SslMode=disable
PoolSize=12

[Redis]
Host=127.0.0.1
Port=6379
Passwd=123456
PoolSize=30

[ChatAuth]
HmacSecret=memochat-dev-chat-secret
TicketTtlSec=20

[LoginCache]
TtlSec=3600

[Kafka]
Brokers=127.0.0.1:19092
ClientId=memochat-login1
ConsumerGroup=memochat-login1-sideeffects

[RabbitMQ]
Host=127.0.0.1
Port=5672
Username=memochat
Password=123456
VHost=/
ExchangeDirect=memochat.direct
ExchangeDlx=memochat.dlx
PrefetchCount=10

[Log]
Level=warn
Dir=../../artifacts/logs/services/LoginService1
Format=json
ToConsole=false
RotateMode=daily
MaxFiles=14
MaxSizeMB=100
Redact=true
Env=local

[Telemetry]
Enabled=true
OtlpEndpoint=http://127.0.0.1:9411/api/v2/spans
Protocol=zipkin-json
SampleRatio=1.0
ExportLogs=true
ExportTraces=true
ExportMetrics=false
ServiceName=LoginService1
ServiceNamespace=memochat
