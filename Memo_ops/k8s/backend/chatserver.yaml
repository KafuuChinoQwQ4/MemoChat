apiVersion: v1
kind: Service
metadata:
  name: memochat-chatserver
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: chatserver
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp
      port: 8090
      targetPort: 8090
      protocol: TCP
    - name: quic
      port: 8190
      targetPort: 8190
      protocol: UDP
    - name: grpc
      port: 50055
      targetPort: 50055
      protocol: TCP
  selector:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: chatserver
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memochat-chatserver
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: chatserver
spec:
  serviceName: memochat-chatserver
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: memochat
      app.kubernetes.io/component: chatserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memochat
        app.kubernetes.io/component: chatserver
    spec:
      containers:
        - name: chatserver
          image: memochat/chatserver:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: tcp
            - containerPort: 8190
              name: quic
            - containerPort: 50055
              name: grpc
          env:
            - name: MEMOCHAT_INSTANCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: MEMOCHAT_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MEMOCHAT_CLUSTER_DISCOVERYMODE
              value: "etcd"
            - name: MEMOCHAT_CLUSTER_ETCDENDPOINTS
              value: "http://memochat-etcd:2379"
            - name: MEMOCHAT_POSTGRES_HOST
              value: "memochat-postgres"
            - name: MEMOCHAT_REDIS_HOST
              value: "memochat-redis"
            - name: MEMOCHAT_MONGODB_URI
              value: "mongodb://memochat-mongodb:27017"
            - name: MEMOCHAT_KAFKA_BROKERS
              value: "memochat-kafka:19092"
            - name: MEMOCHAT_RABBITMQ_HOST
              value: "memochat-rabbitmq"
            - name: MEMOCHAT_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
