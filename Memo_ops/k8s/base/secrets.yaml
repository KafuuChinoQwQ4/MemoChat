apiVersion: v1
kind: Secret
metadata:
  name: memochat-secrets
  namespace: memochat
  labels:
    app.kubernetes.io/name: memochat
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database passwords
  postgres-password: "memochat_pg_pass_2024"
  redis-password: "memochat_redis_pass_2024"
  mongodb-password: "memochat_app:memochat_mongo_2024"

  # Kafka
  kafka-username: "memochat"
  kafka-password: "memochat_kafka_pass_2024"

  # RabbitMQ
  rabbitmq-username: "memochat"
  rabbitmq-password: "memochat_rabbitmq_pass_2024"

  # Email (VarifyServer)
  email-username: "memochat@qq.com"
  email-password: "your_email_auth_code"

  # JWT
  jwt-secret: "memochat_jwt_secret_key_2024_change_in_production"

  # Internal RPC
  rpc-shared-key: "memochat_rpc_shared_key_2024"
