server:
  host: 127.0.0.1
  port: 18080
  cors_origins:
    - "*"

repo:
  root: ../..

cluster:
  config: ../../server/StatusServer/config.ini

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "123456"
  schema: memo_ops
  charset: utf8mb4

redis:
  host: 127.0.0.1
  port: 6379
  password: "123456"
  db: 0
  prefix: ops

observability:
  grafana: http://127.0.0.1:3000
  loki: http://127.0.0.1:3100
  tempo: http://127.0.0.1:3200

paths:
  report_globs:
    - ../runtime/loadtest/reports/**/*.json
  log_globs:
    - ../runtime/services/*/logs/*.json
    - ../runtime/varify/logs/*.json
    - ../runtime/loadtest/logs/*.json
    - ../../build/bin/Release/logs/*.json
    - ../../build/bin/Debug/logs/*.json

platform:
  overview_limit: 10
  run_list_limit: 100
  log_query_limit: 200
