name: memochat

services:
  #######################
  # Data Stores
  #######################
  memochat-mysql:
    image: mysql:8.0.45
    container_name: memochat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: memo
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - D:/docker-data/memochat/mysql:/var/lib/mysql

  memochat-redis:
    image: redis:7.2.5
    container_name: memochat-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "123456"
    ports:
      - "6379:6379"
    volumes:
      - D:/docker-data/memochat/redis:/data

  memochat-postgres:
    image: postgres:16
    container_name: memochat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memochat
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: memo_pg
    ports:
      - "5432:5432"
    volumes:
      - D:/docker-data/memochat/postgres:/var/lib/postgresql/data

  memochat-mongo:
    image: mongo:7.0
    container_name: memochat-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "123456"
      MONGO_INITDB_DATABASE: memochat
    ports:
      - "27017:27017"
    volumes:
      - D:/docker-data/memochat/mongo:/data/db

  #######################
  # Message Queue
  #######################
  memochat-redpanda:
    image: redpandadata/redpanda:v24.2.6
    container_name: memochat-redpanda
    restart: unless-stopped
    ports:
      - "19092:19092"
      - "18082:18082"
    command:
      - redpanda
      - start
      - --kafka-addr=0.0.0.0:19092
      - --advertise-kafka-addr=host.docker.internal:19092
      - --pandaproxy-addr=0.0.0.0:18082
      - --advertise-pandaproxy-addr=host.docker.internal:18082
    volumes:
      - D:/docker-data/memochat/redpanda:/var/lib/redpanda

  memochat-rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: memochat-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: memochat
      RABBITMQ_DEFAULT_PASS: "123456"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - D:/docker-data/memochat/rabbitmq:/var/lib/rabbitmq

  #######################
  # Observability
  #######################
  memochat-prometheus:
    image: prom/prometheus:v2.54.1
    container_name: memochat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
      - --remote.write.url=http://memochat-influxdb:8086/api/v1/write
      - --remote.write.header=X-Organization-Id:memochat
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - D:/docker-data/memochat/observability/prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - memochat-influxdb

  memochat-influxdb:
    image: influxdb:2.7-alpine
    container_name: memochat-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: memochat
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-admin-token
    volumes:
      - D:/docker-data/memochat/observability/influxdb:/var/lib/influxdb2
      - D:/docker-data/memochat/observability/influxdb/config:/etc/influxdb2
    extra_hosts:
      - "host.docker.internal:host-gateway"

  memochat-grafana:
    image: grafana/grafana:11.1.4
    container_name: memochat-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - D:/docker-data/memochat/observability/grafana:/var/lib/grafana

  memochat-loki:
    image: grafana/loki:3.1.1
    container_name: memochat-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - D:/docker-data/memochat/observability/loki:/loki

  memochat-tempo:
    image: grafana/tempo:2.5.0
    container_name: memochat-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    command:
      - -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - D:/docker-data/memochat/observability/tempo:/var/tempo

  memochat-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: memochat-otel-collector
    restart: unless-stopped
    depends_on:
      - memochat-loki
      - memochat-tempo
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
      - "9464:9464"
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./observability/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ../../Memo_ops/runtime:/workspace/Memo_ops/runtime:ro
      - ../../build/bin:/workspace/build/bin:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  memochat-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: memochat-cadvisor
    restart: unless-stopped
    ports:
      - "8088:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  #######################
  # Application Services
  #######################
  memochat-gatedrogon:
    build:
      context: ../..
      dockerfile: deploy/images/Dockerfile.gatedrogon.linux
    container_name: memochat-gatedrogon
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - CONFIG_FILE=config.ini
    volumes:
      - D:/docker-data/memochat/gatedrogon/logs:/app/logs
    depends_on:
      memochat-redis:
        condition: service_healthy
      memochat-postgres:
        condition: service_healthy
      memochat-mongo:
        condition: service_healthy
      memochat-redpanda:
        condition: service_started
      memochat-rabbitmq:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - memochat-network

  # Backend gRPC services (called by GateServerDrogon)
  memochat-chatserver:
    image: memochat-chatserver:latest
    container_name: memochat-chatserver
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "8091:8091"
      - "8092:8092"
      - "8093:8093"
      - "50055:50055"
      - "50056:50056"
      - "50057:50057"
      - "50058:50058"
    depends_on:
      - memochat-redis
      - memochat-postgres
    networks:
      - memochat-network

  memochat-verifyserver:
    image: memochat-verifyserver:latest
    container_name: memochat-verifyserver
    restart: unless-stopped
    ports:
      - "50051:50051"
    depends_on:
      - memochat-mysql
    networks:
      - memochat-network

  memochat-statusserver:
    image: memochat-statusserver:latest
    container_name: memochat-statusserver
    restart: unless-stopped
    ports:
      - "50052:50052"
    depends_on:
      - memochat-mongo
    networks:
      - memochat-network

networks:
  memochat-network:
    driver: bridge
