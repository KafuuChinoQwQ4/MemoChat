input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ "^{" {
    json {
      source => "message"
      target => ""
      skip_on_invalid_json => true
    }
  }

  mutate {
    add_field => { "[@metadata][index]" => "memochat-logs-%{+YYYY.MM.dd}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }
  stdout {
    codec => rubydebug
  }
}
